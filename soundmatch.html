<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>사운드 매칭</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#09090b;
color:white;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
margin:0;
overflow-x:hidden;
}

.card{
perspective:1000px;
cursor:pointer;
}

.card-inner{
position:relative;
width:100%;
height:100%;
transition:transform .5s;
transform-style:preserve-3d;
}

.card.flipped .card-inner{
transform:rotateY(180deg);
}

.card-front,.card-back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
display:flex;
align-items:center;
justify-content:center;
border-radius:18px;
}

.card-front{
background:#18181b;
border:2px solid rgba(255,255,255,.2);
font-size:30px;
font-weight:900;
}

.card-back{
transform:rotateY(180deg);
font-size:36px;
background:#27272a;
border:2px solid currentColor;
}

.matched{
opacity:.3;
}

.shake{
animation:shake .35s;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-6px)}
75%{transform:translateX(6px)}
100%{transform:translateX(0)}
}

.progress{
transition:width .3s;
}

</style>
</head>


<body class="min-h-screen flex justify-center">

<div class="w-full max-w-md bg-black min-h-screen flex flex-col">

<header class="p-4 flex items-center justify-between border-b border-zinc-900">

<a href="index.html"
class="w-10 h-10 flex items-center justify-center rounded-xl bg-zinc-900 text-zinc-400 text-xl">
✕
</a>

<div class="text-center">
<div id="level-title" class="text-xs tracking-widest">LEVEL 1</div>
<div id="timer-display" class="font-mono text-xl font-bold">00:00</div>
</div>

<div class="w-10 h-10 flex items-center justify-center rounded-xl bg-zinc-900">
<span id="move-count" class="text-sm font-bold">0</span>
</div>

</header>

<div class="h-1 bg-zinc-900">
<div id="progress" class="h-full progress bg-blue-500" style="width:0%"></div>
</div>

<main class="flex-1 flex flex-col items-center justify-center p-6">

<div id="grid" class="grid grid-cols-3 gap-3 w-full max-w-[340px]"></div>

<div class="mt-6 text-xs text-zinc-500">
같은 이모지를 찾아보세요
</div>

</main>

</div>

<script>

const audioCtx=new(window.AudioContext||window.webkitAudioContext)()

function playSound(type){

const osc=audioCtx.createOscillator()
const gain=audioCtx.createGain()

osc.connect(gain)
gain.connect(audioCtx.destination)

if(type==="success"){
osc.frequency.value=700
gain.gain.value=.1
osc.start()
osc.stop(audioCtx.currentTime+.2)
}

if(type==="fail"){
osc.frequency.value=120
gain.gain.value=.05
osc.start()
osc.stop(audioCtx.currentTime+.2)
}

if(type==="flip"){
osc.frequency.value=400
gain.gain.value=.02
osc.start()
osc.stop(audioCtx.currentTime+.05)
}

}

const emojiPools=[
['🍔','🍕','🍣','🌮','🍜','🍦','🍰','🍩'],
['🚗','🚀','🚁','🚲','🚜','🏎️','🛹','🚂'],
['🐶','🐱','🐸','🐼','🦁','🐨','🐵','🐯'],
['🎮','🎧','🎸','🎹','🥁','🎲','🎯','🎬']
]

const colors=[
'#FF4D4D','#FFD93D','#4CAF50','#2196F3',
'#FF6F00','#9C27B0','#00BCD4','#FF4081'
]

let level=1
const totalLevels=4
let cards=[]
let flipped=[]
let matched=0
let processing=false
let moves=0
let timer=0
let timerInterval

function shuffle(a){
return a.sort(()=>Math.random()-0.5)
}

function time(t){
const m=Math.floor(t/60).toString().padStart(2,'0')
const s=(t%60).toString().padStart(2,'0')
return m+":"+s
}

function updateStats(){
document.getElementById("move-count").innerText=moves
document.getElementById("timer-display").innerText=time(timer)
}

function startGame(){

if(audioCtx.state==="suspended")audioCtx.resume()

moves=0
timer=0
updateStats()

clearInterval(timerInterval)

timerInterval=setInterval(()=>{
timer++
updateStats()
},1000)

initLevel()

}

function initLevel(){

const grid=document.getElementById("grid")

grid.innerHTML=""
cards=[]
flipped=[]
matched=0
processing=false

let pairCount=4

if(level===2)pairCount=6
if(level>=3)pairCount=8

let pool=shuffle([...emojiPools[Math.floor(Math.random()*emojiPools.length)]]).slice(0,pairCount)

let items=[]

pool.forEach(e=>{
const c=colors[Math.floor(Math.random()*colors.length)]
items.push({emoji:e,color:c})
items.push({emoji:e,color:c})
})

items=shuffle(items)

if(pairCount===8)grid.className="grid grid-cols-4 gap-2 w-full max-w-[340px]"
else grid.className="grid grid-cols-3 gap-3 w-full max-w-[340px]"

items.forEach(i=>{

const card=document.createElement("div")

card.className="card aspect-square"

card.innerHTML=`
<div class="card-inner">

<div class="card-front">?</div>

<div class="card-back" style="color:${i.color};border-color:${i.color}">
${i.emoji}
</div>

</div>
`

card.dataset.emoji=i.emoji

card.onclick=()=>flipCard(card)

grid.appendChild(card)

cards.push(card)

})

}

function flipCard(card){

if(processing||card.classList.contains("flipped")||card.classList.contains("matched"))return

playSound("flip")

card.classList.add("flipped")

flipped.push(card)

if(flipped.length===2){

moves++
updateStats()
processing=true

checkMatch()

}

}

function checkMatch(){

const[c1,c2]=flipped

if(c1.dataset.emoji===c2.dataset.emoji){

playSound("success")

setTimeout(()=>{

c1.classList.add("matched")
c2.classList.add("matched")

matched+=2

document.getElementById("progress").style.width=(matched/cards.length*100)+"%"

flipped=[]
processing=false

checkWin()

},300)

}

else{

playSound("fail")

setTimeout(()=>{

c1.classList.add("shake")
c2.classList.add("shake")

setTimeout(()=>{

c1.classList.remove("flipped","shake")
c2.classList.remove("flipped","shake")

flipped=[]
processing=false

},300)

},200)

}

}

function checkWin(){

if(matched===cards.length){

if(level<totalLevels){

level++
initLevel()

}

else{

alert("성공!")

location.reload()

}

}

}

window.onload=startGame

</script>

</body>
</html>
