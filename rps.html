<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가위바위보 챌린지</title>

<style>
:root {
    --bg-top: #3485f1;
    --bg-bottom: #5da0f8;
}

body {
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system;
    background: linear-gradient(to bottom, var(--bg-top), var(--bg-bottom));
    color: white;
    text-align: center;
}

/* 닫기 */
.close-btn {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 40px;
    height: 40px;
    background: rgba(0,0,0,0.3);
    border-radius: 50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
}

/* 타이틀 */
header {
    margin-top: 80px;
}

h1 {
    font-size: 32px;
}

.score-box {
    margin-top: 10px;
    background: rgba(0,0,0,0.2);
    padding: 6px 16px;
    border-radius: 20px;
}

/* 중앙 */
.battle-view {
    display: flex;
    gap: 40px;
    margin-top: 30px;
}

.label-tag {
    font-size: 24px;
    font-weight: bold;
}

.hand-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: 70px;
}

/* 버튼 */
.controls-card {
    background: white;
    width: 90%;
    max-width: 380px;
    border-radius: 30px;
    padding: 20px;
    margin-top: 40px;
    margin-bottom: 30px;
}

.buttons-group {
    display: flex;
    gap: 12px;
    justify-content: center;
}

.btn-choice {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: none;
    font-size: 36px;
    background: #3485f1;
    color:white;
}

/* 결과 */
#status-message {
    position:absolute;
    top:45%;
    left:50%;
    transform:translate(-50%, -50%) scale(0);
    background:white;
    color:#333;
    padding:16px 36px;
    border-radius:50px;
    font-size:24px;
    font-weight:bold;
    transition:0.3s;
}

#status-message.show {
    transform:translate(-50%, -50%) scale(1);
}

/* 애니 */
@keyframes shake {
    0% { transform:translateY(0); }
    50% { transform:translateY(-20px); }
    100% { transform:translateY(0); }
}

.anim {
    animation: shake 0.3s infinite;
}

.win {
    background: rgba(255,255,255,0.5);
    transform: scale(1.1);
}
</style>
</head>

<body>

<a href="index.html" class="close-btn">✕</a>

<header>
    <h1>아빠에게 5연승 하면<br>상금을 받아요</h1>
    <div class="score-box">현재 연승: <span id="streak">0</span></div>
</header>

<div class="battle-view">

    <div>
        <div class="label-tag">아빠</div>
        <div id="com" class="hand-circle">✋</div>
    </div>

    <div>
        <div class="label-tag">나</div>
        <div id="me" class="hand-circle">?</div>
    </div>

</div>

<div id="status-message">승리!</div>

<div class="controls-card">
    <div class="buttons-group">
        <button class="btn-choice" onclick="play('✌️')">✌️</button>
        <button class="btn-choice" onclick="play('✊')">✊</button>
        <button class="btn-choice" onclick="play('✋')">✋</button>
    </div>
</div>

<script>
let streak = 0;

const com = document.getElementById("com");
const me = document.getElementById("me");
const streakEl = document.getElementById("streak");
const msg = document.getElementById("status-message");

/* 🔊 음성 */
function speak(text) {
    const t = new SpeechSynthesisUtterance(text);
    t.lang = "ko-KR";
    t.rate = 0.9;
    speechSynthesis.cancel();
    speechSynthesis.speak(t);
}

function play(choice){

    com.classList.remove("win");
    me.classList.remove("win");

    com.classList.add("anim");
    me.classList.add("anim");

    com.innerText = "✊";
    me.innerText = "✊";

    setTimeout(()=>{
        com.classList.remove("anim");
        me.classList.remove("anim");

        const arr = ["✌️","✊","✋"];
        const c = arr[Math.floor(Math.random()*3)];

        com.innerText = c;
        me.innerText = choice;

        result(choice, c);
    },700)
}

function result(p,c){

    let text = "";

    if(p===c){
        text="무승부";
        speak("비겼어요");
    }
    else if(
        (p==="✌️"&&c==="✋")||
        (p==="✊"&&c==="✌️")||
        (p==="✋"&&c==="✊")
    ){
        text="승리!";
        speak("이겼어요");
        streak++;
        me.classList.add("win");
    }else{
        text="패배";
        speak("졌어요");
        streak=0;
        com.classList.add("win");
    }

    streakEl.innerText = streak;

    show(text);

    if(streak>=5){
        setTimeout(()=>{
            speak("와! 다섯 번 이겼어요!");
            alert("🎉 5연승 성공!");
            streak=0;
            streakEl.innerText=0;
        },800)
    }
}

function show(t){
    msg.innerText = t;
    msg.classList.add("show");

    setTimeout(()=>{
        msg.classList.remove("show");
    },800)
}
</script>

</body>
</html>
