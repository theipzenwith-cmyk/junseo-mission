<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이모지 터치 게임</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

#score{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:34px;
font-weight:800;
}

#combo{
position:fixed;
top:65px;
left:50%;
transform:translateX(-50%);
color:yellow;
font-size:22px;
font-weight:700;
}

#close{
position:fixed;
top:18px;
left:18px;
font-size:32px;
color:white;
text-decoration:none;
z-index:10;
}

.emoji{
position:absolute;
font-size:80px;
cursor:pointer;
user-select:none;
}

.boom{
position:absolute;
font-size:80px;
animation:boom .35s forwards;
}

@keyframes boom{
0%{transform:scale(1)}
100%{transform:scale(2);opacity:0}
}

#gameover{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:42px;
display:none;
text-align:center;
}

button{
margin-top:20px;
font-size:22px;
padding:14px 24px;
border:none;
border-radius:12px;
}

</style>
</head>

<body>

<a id="close" href="index.html">✕</a>

<div id="score">0</div>
<div id="combo"></div>

<div id="gameover">

<div>💣 GAME OVER</div>

<button onclick="location.reload()">다시하기</button>

</div>

<script>

const scoreUI = document.getElementById("score")
const comboUI = document.getElementById("combo")
const gameoverUI = document.getElementById("gameover")

let score = 0
let combo = 0

let speed = 2
let maxSpeed = 8

let spawn = 700
let minSpawn = 250

let playing = true

const normal = ["🍎","🍓","🐶","⭐"]

function sound(freq){

const ctx = new AudioContext()
const osc = ctx.createOscillator()
const gain = ctx.createGain()

osc.frequency.value = freq
gain.gain.value = 0.1

osc.connect(gain)
gain.connect(ctx.destination)

osc.start()

setTimeout(()=>{

osc.stop()
ctx.close()

},120)

}

function spawnEmoji(){

if(!playing) return

const e = document.createElement("div")
e.className="emoji"

let r = Math.random()
let type="normal"
let emoji=""

if(r < 0.7){

emoji = normal[Math.floor(Math.random()*normal.length)]

}

else if(r < 0.9){

emoji="🌟"
type="gold"

}

else{

emoji="💣"
type="bomb"

}

e.innerText = emoji
e.dataset.type = type

e.style.left = Math.random()* (window.innerWidth-80) + "px"
e.style.top = "-80px"

document.body.appendChild(e)

fall(e)

}

function fall(e){

let y=-80

const drop = setInterval(()=>{

if(!playing){

clearInterval(drop)
return

}

y += speed

e.style.top = y+"px"

if(y > window.innerHeight){

combo=0
comboUI.innerText=""

e.remove()

clearInterval(drop)

}

},20)

e.onclick=()=>{

clearInterval(drop)

hit(e)

}

}

function hit(e){

const type = e.dataset.type

boom(e)

if(type=="bomb"){

sound(120)

gameOver()

}

else if(type=="gold"){

score+=5
combo++
sound(1000)

}

else{

score++
combo++
sound(600)

}

scoreUI.innerText=score

comboCheck()

e.remove()

}

function boom(e){

const b=document.createElement("div")

b.className="boom"
b.innerText="💥"

b.style.left=e.style.left
b.style.top=e.style.top

document.body.appendChild(b)

setTimeout(()=>b.remove(),350)

}

function comboCheck(){

if(combo>=10){

comboUI.innerText="AMAZING 🔥"

}

else if(combo>=5){

comboUI.innerText="SUPER ⚡"

}

else if(combo>=3){

comboUI.innerText="COMBO ✨"

}

}

function gameOver(){

playing=false

gameoverUI.style.display="block"

}

function gameLoop(){

if(!playing) return

spawnEmoji()

setTimeout(gameLoop, spawn)

}

gameLoop()

setInterval(()=>{

// 속도는 어느정도까지만 증가
if(speed < maxSpeed){

speed += 0.5

}

// 대신 이모지 생성이 많아짐
if(spawn > minSpawn){

spawn -= 40

}

},4000)

</script>

</body>
</html>
