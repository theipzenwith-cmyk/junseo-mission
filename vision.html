<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>시력 테스트</title>

<style>

body{
margin:0;
background:white;
font-family:Arial;
text-align:center;
}

.title{
margin-top:40px;
font-size:28px;
font-weight:bold;
}

.board{
margin-top:60px;
}

.line{
margin:20px 0;
}

.num{
font-weight:bold;
color:black;
cursor:pointer;
display:inline-block;
margin:0 10px;
}

.l1 .num{font-size:90px;}
.l2 .num{font-size:70px;}
.l3 .num{font-size:55px;}
.l4 .num{font-size:40px;}
.l5 .num{font-size:28px;}

button{
margin-top:60px;
font-size:20px;
padding:14px 30px;
border:none;
border-radius:8px;
background:black;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="title">시력 테스트</div>

<div class="board">

<div class="line l1">
<span class="num" onclick="clickNum(this)">8</span>
</div>

<div class="line l2">
<span class="num" onclick="clickNum(this)">3</span>
<span class="num" onclick="clickNum(this)">5</span>
</div>

<div class="line l3">
<span class="num" onclick="clickNum(this)">7</span>
<span class="num" onclick="clickNum(this)">2</span>
<span class="num" onclick="clickNum(this)">9</span>
</div>

<div class="line l4">
<span class="num" onclick="clickNum(this)">4</span>
<span class="num" onclick="clickNum(this)">6</span>
<span class="num" onclick="clickNum(this)">1</span>
<span class="num" onclick="clickNum(this)">8</span>
</div>

<div class="line l5">
<span class="num" onclick="clickNum(this)">2</span>
<span class="num" onclick="clickNum(this)">5</span>
<span class="num" onclick="clickNum(this)">7</span>
<span class="num" onclick="clickNum(this)">3</span>
<span class="num" onclick="clickNum(this)">9</span>
</div>

</div>

<button onclick="newTest()">다음 검사</button>

<script>

const emojis=["😀","🐶","🍎","🚗","⭐","🐱","🍌","🎈","🍕"];

function speak(text){

const msg=new SpeechSynthesisUtterance(text);
msg.lang="ko-KR";
speechSynthesis.speak(msg);

}

function clickNum(el){

const n=el.innerText;

speak(n);

el.innerText=emojis[Math.floor(Math.random()*emojis.length)];

}

function rand(){
return Math.floor(Math.random()*9)+1;
}

function newTest(){

const nums=document.querySelectorAll(".num");

nums.forEach(el=>{
el.innerText=rand();
});

}

</script>

</body>
</html>
