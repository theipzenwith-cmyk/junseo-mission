<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>시력 테스트</title>

<style>

body{
margin:0;
background:white;
font-family:Arial, sans-serif;
text-align:center;
}

.title{
margin-top:40px;
font-size:28px;
font-weight:bold;
}

.board{
margin-top:60px;
}

.line{
margin:15px 0;
font-weight:bold;
color:black;
cursor:pointer;
}

.l1{font-size:90px;}
.l2{font-size:70px;}
.l3{font-size:55px;}
.l4{font-size:40px;}
.l5{font-size:28px;}

button{
margin-top:60px;
font-size:20px;
padding:14px 30px;
border:none;
border-radius:8px;
background:black;
color:white;
cursor:pointer;
}

button:hover{
background:#333;
}

</style>

</head>

<body>

<div class="title">
시력 테스트
</div>

<div class="board">

<div class="line l1" onclick="clickNumber(this)">8</div>
<div class="line l2" onclick="clickNumber(this)">3 5</div>
<div class="line l3" onclick="clickNumber(this)">7 2 9</div>
<div class="line l4" onclick="clickNumber(this)">4 6 1 8</div>
<div class="line l5" onclick="clickNumber(this)">2 5 7 3 9</div>

</div>

<button onclick="newTest()">다음 검사</button>

<script>

const emojis = ["😀","🐶","🍎","🚗","⭐","🐱","🍌","🎈","🍕"];

function rand(){
return Math.floor(Math.random()*9)+1;
}

function newTest(){

const lines = document.querySelectorAll(".line");

lines[0].innerText = rand();

lines[1].innerText = rand()+" "+rand();

lines[2].innerText = rand()+" "+rand()+" "+rand();

lines[3].innerText = rand()+" "+rand()+" "+rand()+" "+rand();

lines[4].innerText = rand()+" "+rand()+" "+rand()+" "+rand()+" "+rand();

}

function speak(text){

const msg = new SpeechSynthesisUtterance(text);
msg.lang = "ko-KR";
speechSynthesis.speak(msg);

}

function clickNumber(el){

const number = el.innerText.replace(/ /g,"");

speak(number);

let emojiLine = "";

for(let i=0;i<number.length;i++){

emojiLine += emojis[Math.floor(Math.random()*emojis.length)]+" ";

}

el.innerText = emojiLine;

}

</script>

</body>

</html>
