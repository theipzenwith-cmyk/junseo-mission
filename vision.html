<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>시력 테스트</title>

<style>

body{
margin:0;
background:white;
font-family:Arial, sans-serif;
text-align:center;
}

.title{
margin-top:40px;
font-size:28px;
font-weight:bold;
}

.board{
margin-top:60px;
}

.line{
margin:15px 0;
font-weight:bold;
color:black;
}

.l1{font-size:90px;}
.l2{font-size:70px;}
.l3{font-size:55px;}
.l4{font-size:40px;}
.l5{font-size:28px;}

button{
margin-top:60px;
font-size:20px;
padding:14px 30px;
border:none;
border-radius:8px;
background:black;
color:white;
cursor:pointer;
}

button:hover{
background:#333;
}

</style>

</head>

<body>

<div class="title">
시력 테스트
</div>

<div class="board">

<div class="line l1" id="n1">8</div>
<div class="line l2" id="n2">3 5</div>
<div class="line l3" id="n3">7 2 9</div>
<div class="line l4" id="n4">4 6 1 8</div>
<div class="line l5" id="n5">2 5 7 3 9</div>

</div>

<button onclick="newTest()">다음 검사</button>

<script>

function rand(){
return Math.floor(Math.random()*9)+1;
}

function newTest(){

document.getElementById("n1").innerText = rand();

document.getElementById("n2").innerText =
rand()+" "+rand();

document.getElementById("n3").innerText =
rand()+" "+rand()+" "+rand();

document.getElementById("n4").innerText =
rand()+" "+rand()+" "+rand()+" "+rand();

document.getElementById("n5").innerText =
rand()+" "+rand()+" "+rand()+" "+rand()+" "+rand();

}

</script>

</body>
</html>
