<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>선 따라 그리기</title>

<style>

body{
margin:0;
background:white;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
text-align:center;
}

.title{
margin-top:40px;
font-size:28px;
font-weight:700;
}

.stage{
margin-top:10px;
font-size:20px;
color:#666;
}

canvas{
margin-top:20px;
touch-action:none;
}

.btn{
margin-top:30px;
padding:18px 40px;
font-size:20px;
border-radius:40px;
background:black;
color:white;
border:none;
}

</style>

</head>

<body>

<div class="title">점선을 따라 그려보세요</div>
<div class="stage" id="stage">1 / 50</div>

<canvas id="canvas"></canvas>

<br>

<button class="btn" onclick="nextStage()">다음 단계</button>

<script>

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight * 0.6

let drawing=false
let stage=1

/* 기본 도형 (1~5단계) */

const basicShapes=[
"line",
"curve",
"circle",
"triangle",
"square"
]

/* 랜덤 그림 (6단계 이후) */

const randomShapes=[

"wave",
"s",
"star",
"heart",
"flower",
"cloud",
"sun",
"apple",
"pear",
"banana",
"rabbit",
"fish",
"bird",
"house",
"car",
"balloon",
"umbrella",
"boat",
"moon",
"rocket"

]

let currentShape="line"

function pickShape(){

if(stage<=5){

currentShape=basicShapes[stage-1]

}else{

currentShape=randomShapes[
Math.floor(Math.random()*randomShapes.length)
]

}

}

function drawGuide(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.setLineDash([12,10])
ctx.strokeStyle="#bbb"
ctx.lineWidth=5

let w=canvas.width
let h=canvas.height

ctx.beginPath()

switch(currentShape){

case "line":

ctx.moveTo(100,h/2)
ctx.lineTo(w-100,h/2)
break

case "curve":

ctx.moveTo(100,h/2)
ctx.quadraticCurveTo(w/2,100,w-100,h/2)
break

case "circle":

ctx.arc(w/2,h/2,150,0,Math.PI*2)
break

case "triangle":

ctx.moveTo(w/2,150)
ctx.lineTo(w/2-150,h-150)
ctx.lineTo(w/2+150,h-150)
ctx.closePath()
break

case "square":

ctx.rect(w/2-150,h/2-150,300,300)
break

case "wave":

ctx.moveTo(50,h/2)
for(let i=0;i<6;i++){
ctx.quadraticCurveTo(
100+i*150,
h/2-100,
150+i*150,
h/2
)
}
break

case "s":

ctx.moveTo(100,200)
ctx.bezierCurveTo(w/2,0,w/2,h,w-100,h-200)
break

case "star":

ctx.moveTo(w/2,120)

for(let i=0;i<5;i++){

ctx.lineTo(
w/2 + Math.cos((18+i*72)/180*Math.PI)*150,
h/2 - Math.sin((18+i*72)/180*Math.PI)*150
)

ctx.lineTo(
w/2 + Math.cos((54+i*72)/180*Math.PI)*60,
h/2 - Math.sin((54+i*72)/180*Math.PI)*60
)

}

ctx.closePath()
break

case "heart":

ctx.moveTo(w/2,h/2)

ctx.bezierCurveTo(
w/2-200,h/2-200,
w/2-200,h/2+100,
w/2,h/2+200
)

ctx.bezierCurveTo(
w/2+200,h/2+100,
w/2+200,h/2-200,
w/2,h/2
)

break

default:

ctx.arc(w/2,h/2,150,0,Math.PI*2)

}

ctx.stroke()

}

pickShape()
drawGuide()

canvas.addEventListener("touchstart",start)
canvas.addEventListener("touchmove",draw)
canvas.addEventListener("touchend",end)

function start(e){

drawing=true

ctx.setLineDash([])
ctx.strokeStyle="black"
ctx.lineWidth=8

ctx.beginPath()

let rect=canvas.getBoundingClientRect()

ctx.moveTo(
e.touches[0].clientX-rect.left,
e.touches[0].clientY-rect.top
)

}

function draw(e){

if(!drawing)return

let rect=canvas.getBoundingClientRect()

ctx.lineTo(
e.touches[0].clientX-rect.left,
e.touches[0].clientY-rect.top
)

ctx.stroke()

}

function end(){

drawing=false

}

function nextStage(){

stage++

if(stage>50) stage=1

document.getElementById("stage").innerText=stage+" / 50"

pickShape()
drawGuide()

}

</script>

</body>
</html>
