<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>선 따라 그리기</title>

<style>

body{
margin:0;
background:white;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
text-align:center;
}

/* X 버튼 */

.close{

position:fixed;
top:20px;
left:20px;

width:50px;
height:50px;

border-radius:50%;

background:black;

display:flex;
align-items:center;
justify-content:center;

font-size:26px;

color:white;
text-decoration:none;

}

/* 제목 */

.title{
margin-top:60px;
font-size:28px;
font-weight:700;
}

/* 단계 */

.stage{
margin-top:10px;
font-size:20px;
color:#666;
}

canvas{
margin-top:30px;
touch-action:none;
}

/* 다음 단계 버튼 */

.btn{

margin-top:40px;

padding:18px 40px;

font-size:20px;

border-radius:40px;

background:black;

color:white;

border:none;

}

</style>

</head>

<body>

<a href="index.html" class="close">X</a>

<div class="title">점선을 따라 그려보세요</div>
<div class="stage" id="stage">1 / 50</div>

<canvas id="canvas"></canvas>

<br>

<button class="btn" onclick="nextStage()">다음 단계</button>

<script>

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight * 0.55

let drawing=false
let stage=1

const shapes=[

"line",
"curve",
"circle",
"triangle",
"square",

"mountain",
"wave",
"zigzag",
"hill",
"stairs",
"slide",
"road",
"bridge",
"cloud",
"snake"

]

let currentShape="line"

/* 효과음 */

function playPop(){

const audioCtx = new (window.AudioContext || window.webkitAudioContext)()

const oscillator = audioCtx.createOscillator()
const gainNode = audioCtx.createGain()

oscillator.type = "sine"
oscillator.frequency.setValueAtTime(600, audioCtx.currentTime)
oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.2)

gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime)
gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25)

oscillator.connect(gainNode)
gainNode.connect(audioCtx.destination)

oscillator.start()
oscillator.stop(audioCtx.currentTime + 0.25)

}

/* 도형 선택 */

function pickShape(){

if(stage<=5){

currentShape=shapes[stage-1]

}else{

currentShape=shapes[5+Math.floor(Math.random()*10)]

}

}

/* 점선 가이드 */

function drawGuide(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.setLineDash([12,10])
ctx.strokeStyle="#bbb"
ctx.lineWidth=5

let w=canvas.width
let h=canvas.height

ctx.beginPath()

switch(currentShape){

case "line":

ctx.moveTo(100,h/2)
ctx.lineTo(w-100,h/2)

break

case "curve":

ctx.moveTo(100,h/2)
ctx.quadraticCurveTo(w/2,100,w-100,h/2)

break

case "circle":

ctx.arc(w/2,h/2,150,0,Math.PI*2)

break

case "triangle":

ctx.moveTo(w/2,150)
ctx.lineTo(w/2-150,h-150)
ctx.lineTo(w/2+150,h-150)
ctx.closePath()

break

case "square":

ctx.rect(w/2-150,h/2-150,300,300)

break

case "mountain":

ctx.moveTo(100,h-200)
ctx.lineTo(w/2,200)
ctx.lineTo(w-100,h-200)

break

case "wave":

ctx.moveTo(100,h/2)

for(let i=0;i<4;i++){

ctx.quadraticCurveTo(
200+i*200,
h/2-120,
300+i*200,
h/2
)

}

break

case "zigzag":

ctx.moveTo(100,200)

for(let i=0;i<6;i++){

ctx.lineTo(200+i*120,300)
ctx.lineTo(260+i*120,200)

}

break

case "hill":

ctx.moveTo(100,h-200)

ctx.quadraticCurveTo(
w/2,
100,
w-100,
h-200
)

break

case "stairs":

ctx.moveTo(100,h-200)

for(let i=0;i<5;i++){

ctx.lineTo(200+i*120,h-200-i*40)
ctx.lineTo(200+i*120,h-200-(i+1)*40)

}

break

case "slide":

ctx.moveTo(100,200)
ctx.lineTo(w-200,h-200)

break

case "road":

ctx.moveTo(100,h-200)
ctx.lineTo(w-100,200)

break

case "bridge":

ctx.moveTo(100,h-200)

for(let i=0;i<4;i++){

ctx.quadraticCurveTo(
200+i*200,
h-300,
300+i*200,
h-200
)

}

break

case "cloud":

ctx.moveTo(200,h/2)

ctx.quadraticCurveTo(300,200,400,h/2)
ctx.quadraticCurveTo(500,150,600,h/2)
ctx.quadraticCurveTo(700,200,800,h/2)

break

case "snake":

ctx.moveTo(100,h/2)

for(let i=0;i<5;i++){

ctx.quadraticCurveTo(
200+i*200,
h/2-120,
300+i*200,
h/2
)

ctx.quadraticCurveTo(
400+i*200,
h/2+120,
500+i*200,
h/2
)

}

break

}

ctx.stroke()

}

/* 초기 실행 */

pickShape()
drawGuide()

/* 그리기 */

canvas.addEventListener("touchstart",start)
canvas.addEventListener("touchmove",draw)
canvas.addEventListener("touchend",end)

function start(e){

drawing=true

ctx.setLineDash([])
ctx.strokeStyle="black"
ctx.lineWidth=8

ctx.beginPath()

let rect=canvas.getBoundingClientRect()

ctx.moveTo(
e.touches[0].clientX-rect.left,
e.touches[0].clientY-rect.top
)

}

function draw(e){

if(!drawing)return

let rect=canvas.getBoundingClientRect()

ctx.lineTo(
e.touches[0].clientX-rect.left,
e.touches[0].clientY-rect.top
)

ctx.stroke()

}

function end(){

drawing=false

}

/* 다음 단계 */

function nextStage(){

playPop()

stage++

if(stage>50) stage=1

document.getElementById("stage").innerText=stage+" / 50"

pickShape()
drawGuide()

}

</script>

</body>
</html>
