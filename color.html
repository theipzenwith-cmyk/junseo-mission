<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>숫자 찾기 게임</title>

<style>

body{
margin:0;
background:#06142b;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
color:white;
text-align:center;
overflow:hidden;
}

.title{
margin-top:40px;
font-size:32px;
font-weight:800;
}

.mission{
margin-top:10px;
font-size:26px;
color:#ffd54f;
font-weight:700;
}

#game{
position:relative;
width:100vw;
height:80vh;
margin-top:20px;
}

.balloon{

position:absolute;

display:flex;
align-items:center;
justify-content:center;

border-radius:50%;

font-weight:800;
color:white;

cursor:pointer;

user-select:none;

transition:transform .15s;

}

.balloon:active{
transform:scale(0.9);
}

.pop{
animation:pop .25s forwards;
}

@keyframes pop{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(0);opacity:0;}
}

</style>

</head>

<body>

<div class="title">
숫자 찾기 게임
</div>

<div class="mission" id="mission">
3을 빠르게 찾으세요!
</div>

<div id="game"></div>

<script>

let level = 1
let target = 0
let remaining = 0

const game = document.getElementById("game")
const mission = document.getElementById("mission")

const colors = [
"#ff5252","#ff9800","#ffd740","#00e676",
"#00e5ff","#448aff","#7c4dff","#ff4081"
]

const popSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-balloon-pop-1980.mp3")

function speak(text){

if(!speechSynthesis) return

const t = new SpeechSynthesisUtterance(text)

t.lang="ko-KR"

speechSynthesis.cancel()
speechSynthesis.speak(t)

}

function startRound(){

game.innerHTML=""

let maxNumber = level <3 ? 9 : level <5 ? 20 : 99

target = Math.floor(Math.random()*maxNumber)+1

mission.innerText = target + "를 빠르게 찾으세요!"

speak(target)

let total = 12 + level*3

remaining = Math.floor(total/4)

let size = 90 - level*5

if(size <40) size=40

for(let i=0;i<total;i++){

let num = Math.floor(Math.random()*maxNumber)+1

if(i<remaining) num = target

createBalloon(num,size)

}

}

function createBalloon(num,size){

const b = document.createElement("div")

b.className="balloon"

b.innerText=num

b.style.width=size+"px"
b.style.height=size+"px"

b.style.fontSize=size/3+"px"

b.style.background=colors[Math.floor(Math.random()*colors.length)]

b.style.left=Math.random()*(window.innerWidth-size)+"px"

b.style.top=Math.random()*(window.innerHeight-250)+"px"

b.onclick=()=>{

if(num==target){

popSound.currentTime=0
popSound.play()

b.classList.add("pop")

speak(num)

remaining--

setTimeout(()=>b.remove(),200)

if(remaining==0){

level++

setTimeout(startRound,800)

}

}else{

speak("다시")

b.style.transform="scale(1.2)"

setTimeout(()=>b.style.transform="scale(1)",200)

}

}

game.appendChild(b)

}

startRound()

</script>

</body>
</html>
