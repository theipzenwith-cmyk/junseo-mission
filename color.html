<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>색깔 미션</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
color:white;
text-align:center;
transition:background 0.3s;
}

/* 중앙 텍스트 */

.center{
font-size:44px;
font-weight:700;
line-height:1.4;
cursor:pointer;
}

.en{
font-size:30px;
opacity:0.9;
}

/* X 버튼 */

.close{

position:fixed;
top:20px;
left:20px;

width:50px;
height:50px;

border-radius:50%;

background:rgba(0,0,0,0.4);

display:flex;
align-items:center;
justify-content:center;

font-size:28px;

color:white;
text-decoration:none;

}

/* 화살표 버튼 */

.arrow{

position:fixed;
bottom:40px;

width:60px;
height:60px;

border-radius:50%;

background:black;

display:flex;
align-items:center;
justify-content:center;

font-size:30px;

color:white;

cursor:pointer;

}

.left{
left:30px;
}

.right{
right:30px;
}

</style>

</head>

<body>

<a class="close" href="index.html">✕</a>

<div class="center" onclick="speakColor()">

<div id="ko"></div>
<div id="en" class="en"></div>

</div>

<div class="arrow left" onclick="prevColor()">←</div>
<div class="arrow right" onclick="nextColor()">→</div>

<script>

const colors = [

{ko:"분홍색",en:"pink",color:"#ff6b9d"},
{ko:"파란색",en:"blue",color:"#339af0"},
{ko:"초록색",en:"green",color:"#51cf66"},
{ko:"노란색",en:"yellow",color:"#ffd43b"},
{ko:"보라색",en:"purple",color:"#845ef7"},
{ko:"주황색",en:"orange",color:"#ff922b"},
{ko:"빨간색",en:"red",color:"#ff6b6b"}

];

let index = 0;

function render(){

const c = colors[index];

document.body.style.background = c.color;

document.getElementById("ko").innerText = c.ko;
document.getElementById("en").innerText = c.en;

}

function speakColor(){

const c = colors[index];

const msg = new SpeechSynthesisUtterance(c.ko + ", " + c.en);

msg.lang = "ko-KR";

speechSynthesis.speak(msg);

}

function nextColor(){

index++;

if(index >= colors.length){
index = 0;
}

render();

}

function prevColor(){

index--;

if(index < 0){
index = colors.length-1;
}

render();

}

render();

</script>

</body>
</html>
