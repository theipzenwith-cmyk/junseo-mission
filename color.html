<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>색깔 미션</title>

<style>

body{
margin:0;
height:100vh;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
color:white;
transition:background 0.35s;
}

/* 중앙 텍스트 */

.center{

position:absolute;
top:50%;
left:50%;

transform:translate(-50%,-50%);

text-align:center;

font-size:48px;
font-weight:700;

cursor:pointer;

}

.en{
font-size:32px;
margin-top:10px;
opacity:0.9;
}

/* X 버튼 */

.close{

position:fixed;
top:20px;
left:20px;

width:50px;
height:50px;

border-radius:50%;

background:rgba(0,0,0,0.35);

display:flex;
align-items:center;
justify-content:center;

font-size:28px;

color:white;
text-decoration:none;

}

/* 화살표 */

.arrow{

position:fixed;
bottom:50px;

font-size:70px;
color:white;

cursor:pointer;
user-select:none;

}

.left{
left:30px;
}

.right{
right:30px;
}

/* 찰랑 애니메이션 */

.bounce{
animation:bounce 0.35s ease;
}

@keyframes bounce{

0%{
transform:translate(-50%,-50%) scale(0.9);
}

50%{
transform:translate(-50%,-50%) scale(1.08);
}

100%{
transform:translate(-50%,-50%) scale(1);
}

}

</style>

</head>

<body>

<a class="close" href="index.html">✕</a>

<div class="center" onclick="speakColor()">

<div id="ko"></div>
<div id="en" class="en"></div>

</div>

<div class="arrow left" onclick="prevColor()">‹</div>
<div class="arrow right" onclick="nextColor()">›</div>

<script>

/* 색 목록 */

const colors = [

{ko:"빨간색",en:"red",color:"#ff6b6b"},
{ko:"파란색",en:"blue",color:"#339af0"},
{ko:"노란색",en:"yellow",color:"#ffd43b"},
{ko:"초록색",en:"green",color:"#51cf66"},
{ko:"보라색",en:"purple",color:"#845ef7"},
{ko:"주황색",en:"orange",color:"#ff922b"},
{ko:"분홍색",en:"pink",color:"#ff6b9d"}

];

/* 시작 랜덤 */

let index = Math.floor(Math.random()*colors.length);

/* WebAudio */

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

/* 효과음 함수 */

function playSound(){

const sounds = [

{freq:600,time:0.15},   // 뽕
{freq:900,time:0.12},   // 뾰로
{freq:700,time:0.2},    // 띠링
{freq:500,time:0.18}    // 팅

];

const s = sounds[Math.floor(Math.random()*sounds.length)];

const osc = audioCtx.createOscillator();
const gain = audioCtx.createGain();

osc.type="sine";
osc.frequency.value=s.freq;

gain.gain.value=0.2;

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.start();

setTimeout(()=>{
osc.stop();
}, s.time*1000);

}

/* 화면 렌더 */

function render(){

const c = colors[index];

document.body.style.background = c.color;

const center = document.querySelector(".center");

document.getElementById("ko").innerText = c.ko;
document.getElementById("en").innerText = c.en;

/* 찰랑 */

center.classList.remove("bounce");
void center.offsetWidth;
center.classList.add("bounce");

/* 랜덤 효과음 */

playSound();

}

/* 음성 */

function speakColor(){

const c = colors[index];

const msg = new SpeechSynthesisUtterance(c.ko + ", " + c.en);

msg.lang = "ko-KR";

speechSynthesis.speak(msg);

}

/* 다음 */

function nextColor(){

index++;

if(index >= colors.length){
index = 0;
}

render();

}

/* 이전 */

function prevColor(){

index--;

if(index < 0){
index = colors.length-1;
}

render();

}

render();

</script>

</body>
</html>
