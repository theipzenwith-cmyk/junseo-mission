<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>준서 놀이터 관리자</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
margin:0;
background:#111;
color:white;
padding:30px;
}

h1{
margin-bottom:20px;
}

input{
padding:8px;
border-radius:6px;
border:none;
margin-right:6px;
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
font-weight:700;
}

.game{
margin-bottom:10px;
display:flex;
align-items:center;
gap:6px;
}

textarea{
width:100%;
height:200px;
margin-top:20px;
border-radius:10px;
padding:10px;
}

</style>

</head>

<body>

<h1>준서 놀이터 관리자</h1>

<h3>게임 추가</h3>

<input id="title" placeholder="게임 제목">
<input id="url" placeholder="파일명 (ex vision.html)">
<button onclick="addGame()">추가</button>

<hr>

<h3>게임 목록</h3>

<div id="list"></div>

<button onclick="moveUp()">⬆ 순서 위로</button>
<button onclick="moveDown()">⬇ 순서 아래로</button>

<h3>missions.json</h3>

<textarea id="output"></textarea>

<button onclick="copyJSON()">JSON 복사</button>

<script>

let games=[
{
title:"👁 시력 테스트",
url:"vision.html",
active:true
},
{
title:"🎨 색깔 미션",
url:"color.html",
active:true
},
{
title:"🎈 숫자 풍선 찾기",
url:"number.html",
active:true
},
{
title:"💥 이모지 터치 게임",
url:"emoji.html",
active:true
},
{
title:"✏️ 선따라 그리기",
url:"trace.html",
active:true
}
]

let selected=-1

function render(){

const list=document.getElementById("list")
list.innerHTML=""

games.forEach((g,i)=>{

const div=document.createElement("div")
div.className="game"

div.innerHTML=`
<input value="${g.title}" onchange="updateTitle(${i},this.value)">
<input value="${g.url}" onchange="updateUrl(${i},this.value)">
<label>
ON
<input type="checkbox" ${g.active?"checked":""} onchange="toggle(${i})">
</label>
<button onclick="select(${i})">선택</button>
<button onclick="removeGame(${i})">삭제</button>
`

list.appendChild(div)

})

generateJSON()

}

function updateTitle(i,v){
games[i].title=v
generateJSON()
}

function updateUrl(i,v){
games[i].url=v
generateJSON()
}

function toggle(i){
games[i].active=!games[i].active
generateJSON()
}

function select(i){
selected=i
}

function moveUp(){

if(selected<=0) return

let temp=games[selected]
games[selected]=games[selected-1]
games[selected-1]=temp

selected--

render()

}

function moveDown(){

if(selected<0 || selected>=games.length-1) return

let temp=games[selected]
games[selected]=games[selected+1]
games[selected+1]=temp

selected++

render()

}

function removeGame(i){

games.splice(i,1)

render()

}

function addGame(){

const title=document.getElementById("title").value
const url=document.getElementById("url").value

games.push({
title:title,
url:url,
active:true
})

render()

}

function generateJSON(){

const json={
games:games
}

document.getElementById("output").value=
JSON.stringify(json,null,2)

}

function copyJSON(){

const textarea=document.getElementById("output")

textarea.select()

document.execCommand("copy")

alert("missions.json 복사됨")

}

render()

</script>

</body>
</html>
