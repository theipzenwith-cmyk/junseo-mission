<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>준서 놀이터 관리자</title>

<style>
body{
font-family:-apple-system;
background:#111;
color:white;
padding:30px;
}

input{
padding:8px;
border-radius:6px;
border:none;
margin-right:6px;
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
font-weight:700;
}

.game{
margin-bottom:10px;
display:flex;
gap:6px;
flex-wrap:wrap;
}

textarea{
width:100%;
height:240px;
margin-top:20px;
border-radius:10px;
padding:10px;
}
</style>
</head>

<body>

<h1>준서 놀이터 관리자</h1>

<h3>게임 추가</h3>

<input id="title" placeholder="게임 제목">
<input id="desc" placeholder="설명">
<input id="url" placeholder="파일명 (rps.html)">
<button onclick="addGame()">추가</button>

<hr>

<div id="list"></div>

<h3>missions.json</h3>
<textarea id="output"></textarea>
<button onclick="copyJSON()">JSON 복사</button>

<script>

let games = []

/* 🔥 핵심: JSON 불러오기 */
async function load(){
  const res = await fetch("missions.json")
  const data = await res.json()
  games = data.games || []
  render()
}

/* 렌더 */
function render(){
  const list=document.getElementById("list")
  list.innerHTML=""

  games.forEach((g,i)=>{

    const div=document.createElement("div")
    div.className="game"

    div.innerHTML=`
    <input value="${g.title}" onchange="updateTitle(${i},this.value)">
    <input value="${g.desc}" onchange="updateDesc(${i},this.value)">
    <input value="${g.url}" onchange="updateUrl(${i},this.value)">
    <label>ON <input type="checkbox" ${g.active?"checked":""} onchange="toggle(${i})"></label>
    <button onclick="removeGame(${i})">삭제</button>
    `

    list.appendChild(div)
  })

  generateJSON()
}

/* 수정 */
function updateTitle(i,v){ games[i].title=v; generateJSON(); }
function updateDesc(i,v){ games[i].desc=v; generateJSON(); }
function updateUrl(i,v){ games[i].url=v; generateJSON(); }

function toggle(i){
  games[i].active=!games[i].active
  generateJSON()
}

function removeGame(i){
  games.splice(i,1)
  render()
}

/* 추가 */
function addGame(){
  const title=document.getElementById("title").value
  const desc=document.getElementById("desc").value
  const url=document.getElementById("url").value

  if(!title || !url){
    alert("제목 / 파일명 입력")
    return
  }

  games.push({
    title,
    desc,
    url,
    active:true
  })

  render()
}

/* JSON 출력 */
function generateJSON(){
  document.getElementById("output").value =
  JSON.stringify({games:games},null,2)
}

/* 복사 */
function copyJSON(){
  const t=document.getElementById("output")
  t.select()
  document.execCommand("copy")
  alert("복사 완료 → missions.json 붙여넣기")
}

/* 실행 */
load()

</script>

</body>
</html>
