<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>준서 놀이터 관리자</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
margin:0;
background:#111;
color:white;
padding:30px;
}

h1{
margin-bottom:30px;
}

input{
padding:10px;
margin:5px;
border-radius:8px;
border:none;
}

button{
padding:10px 16px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
font-weight:700;
cursor:pointer;
}

.game{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
}

</style>

</head>

<body>

<h1>준서 놀이터 관리자</h1>

<h3>게임 추가</h3>

<input id="title" placeholder="게임 제목">

<input id="url" placeholder="파일명 (ex vision.html)">

<button onclick="addGame()">추가</button>

<hr>

<h3>게임 목록</h3>

<div id="list"></div>

<script>

let missions

function load(){

fetch("missions.json")
.then(res=>res.json())
.then(data=>{

missions=data
render()

})

}

function render(){

const list=document.getElementById("list")

list.innerHTML=""

missions.games.forEach((g,i)=>{

const div=document.createElement("div")

div.className="game"

div.innerHTML=`
<input value="${g.title}" onchange="updateTitle(${i},this.value)">
<input value="${g.url}" onchange="updateUrl(${i},this.value)">
<label>
ON
<input type="checkbox" ${g.active ? "checked":""}
onchange="toggle(${i})">
</label>
<button onclick="removeGame(${i})">삭제</button>
`

list.appendChild(div)

})

}

function updateTitle(i,val){
missions.games[i].title=val
save()
}

function updateUrl(i,val){
missions.games[i].url=val
save()
}

function toggle(i){
missions.games[i].active=!missions.games[i].active
save()
}

function removeGame(i){
missions.games.splice(i,1)
render()
save()
}

function addGame(){

const title=document.getElementById("title").value
const url=document.getElementById("url").value

missions.games.push({
title:title,
url:url,
active:true
})

render()
save()

}

function save(){

console.log("JSON 수정됨 (수동으로 missions.json 업데이트 필요)")

}

load()

</script>

</body>
</html>
