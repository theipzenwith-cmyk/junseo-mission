<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>준서 놀이터 관리자</title>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

<style>
body{
font-family:-apple-system;
background:#111;
color:white;
padding:30px;
}

input{
padding:8px;
border-radius:6px;
border:none;
margin-right:6px;
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
font-weight:700;
}

.game{
margin-bottom:10px;
display:flex;
gap:6px;
flex-wrap:wrap;
cursor:grab;
}

textarea{
width:100%;
height:240px;
margin-top:20px;
border-radius:10px;
padding:10px;
}

.drag{
cursor:grab;
font-size:20px;
padding:0 6px;
}
</style>
</head>

<body>

<h1>준서 놀이터 관리자</h1>

<h3>게임 추가</h3>

<input id="title" placeholder="게임 제목">
<input id="desc" placeholder="설명">
<input id="url" placeholder="파일명 (rps.html)">
<button onclick="addGame()">추가</button>

<hr>

<div id="list"></div>

<br>

<button onclick="saveLocal()">💾 저장 (브라우저)</button>
<button onclick="resetData()">🧹 초기화</button>

<h3>missions.json</h3>
<textarea id="output"></textarea>
<button onclick="copyJSON()">JSON 복사</button>

<script>

let games = []

/* 🔥 최초 로드 */
async function load(){

  const saved = localStorage.getItem("games")

  if(saved){
    games = JSON.parse(saved)
    render()
    return
  }

  const res = await fetch("missions.json")
  const data = await res.json()
  games = data.games || []
  render()
}

/* 렌더 */
function render(){
  const list=document.getElementById("list")
  list.innerHTML=""

  games.forEach((g,i)=>{

    const div=document.createElement("div")
    div.className="game"

    div.innerHTML=`
    <span class="drag">☰</span>
    <input value="${g.title}" onchange="updateTitle(${i},this.value)">
    <input value="${g.desc}" onchange="updateDesc(${i},this.value)">
    <input value="${g.url}" onchange="updateUrl(${i},this.value)">
    <label>ON <input type="checkbox" ${g.active?"checked":""} onchange="toggle(${i})"></label>
    <button onclick="removeGame(${i})">삭제</button>
    `

    list.appendChild(div)
  })

  new Sortable(list, {
    animation:150,
    handle:'.drag',
    onEnd: function(evt){
      const moved = games.splice(evt.oldIndex,1)[0]
      games.splice(evt.newIndex,0,moved)
      saveLocalSilent()
      render()
    }
  })

  generateJSON()
}

/* 수정 */
function updateTitle(i,v){ games[i].title=v; saveLocalSilent(); generateJSON(); }
function updateDesc(i,v){ games[i].desc=v; saveLocalSilent(); generateJSON(); }
function updateUrl(i,v){ games[i].url=v; saveLocalSilent(); generateJSON(); }

function toggle(i){
  games[i].active=!games[i].active
  saveLocalSilent()
  generateJSON()
}

function removeGame(i){
  games.splice(i,1)
  saveLocalSilent()
  render()
}

/* 추가 */
function addGame(){
  const title=document.getElementById("title").value
  const desc=document.getElementById("desc").value
  const url=document.getElementById("url").value

  if(!title || !url){
    alert("제목 / 파일명 입력")
    return
  }

  games.push({
    title,
    desc,
    url,
    active:true
  })

  document.getElementById("title").value=""
  document.getElementById("desc").value=""
  document.getElementById("url").value=""

  saveLocalSilent()
  render()
}

/* 🔥 브라우저 저장 */
function saveLocal(){
  localStorage.setItem("games", JSON.stringify(games))
  alert("저장 완료 (이 브라우저에서 유지됨)")
}

/* 자동 저장 (알림 없음) */
function saveLocalSilent(){
  localStorage.setItem("games", JSON.stringify(games))
}

/* 초기화 */
function resetData(){
  if(confirm("저장된 데이터 삭제할까요?")){
    localStorage.removeItem("games")
    location.reload()
  }
}

/* JSON 출력 */
function generateJSON(){
  document.getElementById("output").value =
  JSON.stringify({games:games},null,2)
}

/* 복사 */
function copyJSON(){
  const t=document.getElementById("output")
  t.select()
  document.execCommand("copy")
  alert("복사 완료 → missions.json에 붙여넣기")
}

load()

</script>

</body>
</html>
