<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>준서 놀이터</title>

<style>

body{

margin:0;
min-height:100vh;

font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;

display:flex;
flex-direction:column;
align-items:center;

color:white;

background:linear-gradient(
120deg,
#ff7a7a,
#6a85ff,
#8fd3f4,
#84fab0
);

background-size:400% 400%;

animation:bgMove 18s ease infinite;

}

@keyframes bgMove{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.title{

margin-top:60px;
font-size:36px;
font-weight:800;

}

/* GRID */

.grid{

margin-top:50px;

display:grid;

grid-template-columns:repeat(2,1fr);

gap:40px;

padding:20px;

width:100%;
max-width:900px;

}

/* 큰폰 */

@media(min-width:600px){

.grid{

grid-template-columns:repeat(3,1fr);

}

}

/* 아이패드 */

@media(min-width:1000px){

.grid{

grid-template-columns:repeat(4,1fr);

}

}

/* APP */

.app{

display:flex;
flex-direction:column;
align-items:center;

text-decoration:none;
color:white;

}

/* ICON */

.icon{

width:130px;
height:130px;

border-radius:30px;

display:flex;
align-items:center;
justify-content:center;

font-size:60px;

background:linear-gradient(
135deg,
#3b82f6,
#9333ea
);

box-shadow:
0 12px 30px rgba(0,0,0,0.4),
inset 0 2px 4px rgba(255,255,255,0.2);

transition:transform .15s;

}

.icon:active{

transform:scale(0.9);

}

/* LABEL */

.label{

margin-top:14px;

font-size:18px;

text-align:center;

}

</style>

</head>

<body>

<div class="title">
준서 놀이터
</div>

<div class="grid" id="gameGrid"></div>

<script>

fetch("missions.json")
.then(res=>res.json())
.then(data=>{

const grid=document.getElementById("gameGrid")

data.games.forEach(game=>{

if(!game.active) return

const a=document.createElement("a")

a.href=game.url
a.className="app"

const icon=document.createElement("div")
icon.className="icon"

const emoji=game.title.split(" ")[0]

icon.innerText=emoji

const label=document.createElement("div")
label.className="label"

label.innerText=game.title.replace(emoji,"").trim()

a.appendChild(icon)
a.appendChild(label)

grid.appendChild(a)

})

})

</script>

</body>
</html>
