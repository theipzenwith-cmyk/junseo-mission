<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>준서 놀이터</title>

<style>

body{
margin:0;
background:black;
font-family:-apple-system;
color:white;
}

/* 헤더 */
.header{
padding:60px 24px 20px;
max-width:900px;
margin:auto;
}

.title{
font-size:46px;
font-weight:900;
background:linear-gradient(90deg,#ff6ec4,#7873f5,#42e695,#ff6ec4);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
color:#888;
margin-top:10px;
font-size:18px;
}

/* 리스트 */
.list{
max-width:900px;
margin:auto;
padding:20px 24px;
}

.game{
display:flex;
gap:20px;
padding:28px 0;
border-bottom:1px solid #222;
text-decoration:none;
color:white;

align-items:center; /* 🔥 핵심 */
}

.thumb{
width:90px;
height:90px;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
}

.text{
flex:1;
display:flex;
flex-direction:column;
justify-content:center; /* 🔥 핵심 */
}

.game-title{
font-size:24px;
font-weight:800;
}

.game-desc{
font-size:16px;
color:#aaa;
margin-top:4px;
}

/* 메모 */
.memo-wrap{
max-width:900px;
margin:auto;
padding:20px 24px 80px;
}

.memo-input{
display:flex;
gap:10px;
margin-bottom:20px;
}

.memo-input input{
flex:1;
background:#222;
border:none;
border-radius:14px;
padding:16px;
font-size:16px;
color:white;
outline:none;
}

.memo-input input::placeholder{
color:rgba(255,255,255,0.5);
}

.send-btn{
width:52px;
height:52px;
border-radius:50%;
background:#333;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
cursor:pointer;
}

.memo{
background:#1a1a1a;
padding:16px;
border-radius:14px;
margin-bottom:12px;
}

.profile{
display:flex;
gap:8px;
align-items:center;
font-size:13px;
color:#aaa;
margin-bottom:6px;
}

.profile span{
font-size:18px;
}

.memo-text{
font-size:16px;
}

.memo-actions{
margin-top:8px;
font-size:14px;
color:#ccc;
}

.like{
cursor:pointer;
}

/* 모달 */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:flex;
align-items:center;
justify-content:center;
z-index:999;
}

.modal-box{
background:#1a1a1a;
padding:20px;
border-radius:16px;
text-align:center;
width:260px;
}

.modal-buttons{
margin-top:15px;
display:flex;
gap:10px;
}

.modal-buttons button{
flex:1;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

.cancel{background:#333;}
.ok{background:#ef4444;}

</style>
</head>

<body>

<div class="header">
<div class="title">준서 놀이터</div>
<div class="subtitle">오늘은 이 게임 🎮</div>
</div>

<div class="list" id="gameList"></div>

<div class="memo-wrap">
<h2>📝 준서에게 한마디</h2>

<div class="memo-input">
<input id="memoInput" placeholder="준서에게 메모 남기기">
<div class="send-btn" onclick="addMemo()">✈️</div>
</div>

<div id="memoList"></div>
</div>

<div id="modalRoot"></div>

<script>

/* 게임 */
const colors=[
"#3b82f6","#9333ea","#ef4444","#f97316",
"#22c55e","#eab308","#06b6d4","#6366f1"
]

async function loadGames(){
  try{
    const res=await fetch("missions.json")
    const data=await res.json()

    const list=document.getElementById("gameList")
    list.innerHTML=""

    data.games.forEach((g,i)=>{

      if(!g.active) return

      const emoji = g.emoji || "🎮"

      const div=document.createElement("div")
      div.className="game"

      div.innerHTML=`
        <div class="thumb" style="background:${colors[i%colors.length]}">
          ${emoji}
        </div>

        <div class="text">
          <div class="game-title">${g.title}</div>
          <div class="game-desc">${g.desc || ""}</div>
        </div>
      `

      list.appendChild(div)
    })

  }catch{
    document.getElementById("gameList").innerHTML="불러오기 실패"
  }
}

/* 프로필 */
function getProfile(){
  let p=JSON.parse(localStorage.getItem("profile")||"null")
  if(p) return p

  const emojis=["🐶","🐱","🐼","🦊"]
  const names=["행복한","귀여운","용감한"]

  p={
    emoji:emojis[Math.floor(Math.random()*emojis.length)],
    name:names[Math.floor(Math.random()*names.length)]+" 친구"
  }

  localStorage.setItem("profile",JSON.stringify(p))
  return p
}

/* 메모 */
function loadMemo(){
  const memos=JSON.parse(localStorage.getItem("memos")||"[]")
  renderMemo(memos)
}

function addMemo(){
  const input=document.getElementById("memoInput")
  if(!input.value.trim()) return

  const memos=JSON.parse(localStorage.getItem("memos")||"[]")
  const p=getProfile()

  memos.unshift({
    text:input.value,
    time:new Date().toLocaleString(),
    emoji:p.emoji,
    name:p.name,
    likes:0
  })

  localStorage.setItem("memos",JSON.stringify(memos))
  input.value=""
  renderMemo(memos)
}

/* 좋아요 */
function likeMemo(i){
  const memos=JSON.parse(localStorage.getItem("memos")||"[]")
  memos[i].likes++
  localStorage.setItem("memos",JSON.stringify(memos))
  renderMemo(memos)
}

/* 모달 */
function showDeleteConfirm(i){

  const modal=document.createElement("div")
  modal.className="modal"

  modal.innerHTML=`
    <div class="modal-box">
      🐶 정말 지울까?
      <div class="modal-buttons">
        <button class="cancel">취소</button>
        <button class="ok">삭제</button>
      </div>
    </div>
  `

  modal.querySelector(".cancel").onclick=()=>modal.remove()

  modal.querySelector(".ok").onclick=()=>{
    let memos=JSON.parse(localStorage.getItem("memos")||"[]")
    memos.splice(i,1)
    localStorage.setItem("memos",JSON.stringify(memos))
    modal.remove()
    renderMemo(memos)
  }

  document.getElementById("modalRoot").appendChild(modal)
}

/* 롱탭 */
function longPress(el,i){
  let timer

  el.addEventListener("touchstart",()=>{
    timer=setTimeout(()=>{
      showDeleteConfirm(i)
    },700)
  })

  el.addEventListener("touchend",()=>{
    clearTimeout(timer)
  })
}

/* 렌더 */
function renderMemo(memos){
  const list=document.getElementById("memoList")
  list.innerHTML=""

  memos.forEach((m,i)=>{
    const div=document.createElement("div")
    div.className="memo"

    div.innerHTML=`
      <div class="profile">
        <span>${m.emoji}</span>
        ${m.name} · ${m.time}
      </div>
      <div class="memo-text">${m.text}</div>
      <div class="memo-actions">
        <span class="like" onclick="likeMemo(${i})">👍 ${m.likes}</span>
      </div>
    `

    longPress(div,i)
    list.appendChild(div)
  })
}

loadGames()
loadMemo()

</script>

</body>
</html>
