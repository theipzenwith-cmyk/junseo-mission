<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>준서 놀이터</title>

<meta property="og:title" content="준서 놀이터">
<meta property="og:description" content="아이들을 위한 재미있는 게임 놀이터">
<meta property="og:type" content="website">

<style>

body{
margin:0;
background:black;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
color:white;
}

.header{
padding:60px 30px 20px;
max-width:900px;
margin:auto;
}

.title{
font-size:52px;
font-weight:900;
background:linear-gradient(90deg,#ff6ec4,#7873f5,#42e695,#ff6ec4);
background-size:300% 300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:gradientMove 6s ease infinite;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.subtitle{
color:#888;
margin-top:10px;
font-size:22px;
}

.list{
max-width:900px;
margin:auto;
padding:20px 30px 40px;
}

.game{
display:flex;
align-items:center;
gap:26px;
padding:34px 0;
border-bottom:1px solid #222;
text-decoration:none;
color:white;
transition:0.2s;
}

.game:active{
transform:scale(0.97);
}

.thumb{
width:100px;
height:100px;
border-radius:24px;
display:flex;
align-items:center;
justify-content:center;
font-size:46px;
box-shadow:
0 12px 30px rgba(0,0,0,0.6),
inset 0 4px 8px rgba(255,255,255,0.25),
inset 0 -8px 14px rgba(0,0,0,0.25);
}

.text{flex:1;}

.game-title{
font-size:30px;
font-weight:800;
}

.game-desc{
font-size:20px;
color:#aaa;
margin-top:6px;
}

/* 메모 영역 */
.memo-wrap{
max-width:900px;
margin:auto;
padding:30px;
}

.memo{
background:#1a1a1a;
padding:14px;
border-radius:12px;
margin-bottom:10px;
}

.profile{
display:flex;
align-items:center;
gap:8px;
font-size:14px;
color:#aaa;
margin-bottom:6px;
}

.profile span{
font-size:20px;
}

input{
padding:10px;
border-radius:10px;
border:none;
flex:1;
}

button{
padding:10px 14px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
font-weight:700;
cursor:pointer;
}

.loading{
text-align:center;
padding:60px;
color:#666;
}

</style>

</head>

<body>

<div class="header">
<div class="title">준서 놀이터</div>
<div class="subtitle">오늘은 이 게임 🎮</div>
</div>

<div class="list" id="gameList">
<div class="loading">불러오는 중...</div>
</div>

<!-- 메모 -->
<div class="memo-wrap">

<h2>📝 준서에게 한마디</h2>

<div style="display:flex;gap:10px;margin-bottom:14px;">
<input id="memoInput" placeholder="준서에게 메모 남기기">
<button onclick="addMemo()">작성</button>
</div>

<div id="memoList"></div>

</div>

<script>

/* 게임 */
const colors=[
"#3b82f6","#9333ea","#ef4444","#f97316",
"#22c55e","#eab308","#06b6d4","#6366f1"
]

async function loadGames(){
  try{
    const res = await fetch("missions.json")
    const data = await res.json()

    const list=document.getElementById("gameList")
    list.innerHTML=""

    const games=data.games || []

    games.forEach((game,i)=>{

      if(!game.active) return

      const a=document.createElement("a")
      a.href=game.url
      a.className="game"

      const thumb=document.createElement("div")
      thumb.className="thumb"
      thumb.style.background=colors[i%colors.length]

      let emoji="🎮"
      const first = game.title ? game.title.trim().split(" ")[0] : ""
      if(first && first.length<=3){ emoji=first }

      thumb.innerText=emoji

      const text=document.createElement("div")
      text.className="text"

      const title=document.createElement("div")
      title.className="game-title"

      const cleanTitle = game.title ? game.title.replace(emoji,"").trim() : ""
      title.innerText=cleanTitle || game.desc || "게임"

      const desc=document.createElement("div")
      desc.className="game-desc"
      desc.innerText=game.desc || ""

      text.appendChild(title)
      text.appendChild(desc)

      a.appendChild(thumb)
      a.appendChild(text)

      list.appendChild(a)
    })

  }catch(e){
    document.getElementById("gameList").innerHTML =
    "<div class='loading'>게임 불러오기 실패</div>"
  }
}

/* 프로필 */
function getProfile(){
  try{
    let p = JSON.parse(localStorage.getItem("profile"))
    if(p) return p
  }catch{
    localStorage.removeItem("profile")
  }

  const emojis=["🐶","🐱","🐼","🦊","🐰","🐸","🐻","🐯"]
  const names=["행복한","용감한","귀여운","똑똑한","빠른","웃는"]

  const p={
    emoji: emojis[Math.floor(Math.random()*emojis.length)],
    name: names[Math.floor(Math.random()*names.length)]+" 친구"
  }

  localStorage.setItem("profile",JSON.stringify(p))
  return p
}

/* 메모 */
function loadMemo(){
  try{
    const memos = JSON.parse(localStorage.getItem("memos") || "[]")
    renderMemo(memos)
  }catch{
    localStorage.removeItem("memos")
    renderMemo([])
  }
}

function addMemo(){
  const input=document.getElementById("memoInput")
  const text=input.value.trim()
  if(!text) return

  let memos=[]
  try{
    memos = JSON.parse(localStorage.getItem("memos") || "[]")
  }catch{}

  const profile = getProfile()

  memos.unshift({
    text,
    time:new Date().toLocaleString(),
    emoji:profile.emoji,
    name:profile.name,
    likes:0
  })

  localStorage.setItem("memos",JSON.stringify(memos))

  input.value=""
  renderMemo(memos)
}

/* 좋아요 */
function likeMemo(i){

  let liked=[]
  try{
    liked = JSON.parse(localStorage.getItem("liked") || "[]")
  }catch{}

  if(liked.includes(i)){
    alert("이미 좋아요 했어요")
    return
  }

  let memos=[]
  try{
    memos = JSON.parse(localStorage.getItem("memos") || "[]")
  }catch{}

  if(!memos[i]) return

  memos[i].likes = (memos[i].likes || 0) + 1

  liked.push(i)

  localStorage.setItem("liked",JSON.stringify(liked))
  localStorage.setItem("memos",JSON.stringify(memos))

  renderMemo(memos)
}

/* 렌더 */
function renderMemo(memos){

  const list=document.getElementById("memoList")
  list.innerHTML=""

  memos.forEach((m,i)=>{

    const div=document.createElement("div")
    div.className="memo"

    div.innerHTML=`
      <div class="profile">
        <span>${m.emoji}</span>
        ${m.name} · ${m.time}
      </div>

      <div style="font-size:18px;">${m.text}</div>

      <div style="margin-top:8px;display:flex;gap:10px;">
        <button onclick="likeMemo(${i})">👍 ${m.likes || 0}</button>
        <button onclick="deleteMemo(${i})" style="background:#ef4444;">삭제</button>
      </div>
    `

    list.appendChild(div)
  })
}

function deleteMemo(i){
  let memos=[]
  try{
    memos = JSON.parse(localStorage.getItem("memos") || "[]")
  }catch{}

  memos.splice(i,1)
  localStorage.setItem("memos",JSON.stringify(memos))
  renderMemo(memos)
}

/* 실행 */
loadGames()
loadMemo()

</script>

</body>
</html>
