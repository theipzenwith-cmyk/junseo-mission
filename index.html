<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>준서 놀이터</title>

<style>

body{
margin:0;
background:#000;
color:white;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

.header{
padding:60px 20px 30px;
text-align:center;
}

.title{
font-size:36px;
font-weight:800;
}

.subtitle{
margin-top:10px;
font-size:18px;
color:#aaa;
}

.container{
padding:25px;
}

.card{

height:140px;
border-radius:22px;

display:flex;
align-items:center;
justify-content:center;

color:white;
font-size:22px;
font-weight:700;

text-decoration:none;

box-shadow:0 8px 20px rgba(0,0,0,0.6);

}

.card:active{
transform:scale(0.97);
}

</style>

</head>

<body>

<div class="header">

<div class="title">
준서 놀이터
</div>

<div class="subtitle">
재미있는 두뇌 게임 🎮
</div>

</div>

<div class="container">

<a id="visionCard" class="card" href="vision.html">
시력 테스트 👀
</a>

</div>

<script>

const colors = [
"#ff6b6b",
"#4dabf7",
"#38d9a9",
"#ffd43b",
"#9775fa",
"#ffa94d"
];

const randomColor = colors[Math.floor(Math.random()*colors.length)];

document.getElementById("visionCard").style.background = randomColor;

</script>

</body>

</html>
