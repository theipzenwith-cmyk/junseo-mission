<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>준서 놀이터</title>

<meta property="og:title" content="준서 놀이터">
<meta property="og:description" content="아이들을 위한 재미있는 게임 놀이터">
<meta property="og:type" content="website">

<style>

body{
margin:0;
background:black;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
color:white;
}

.header{
padding:60px 30px 20px;
max-width:900px;
margin:auto;
}

.title{
font-size:52px;
font-weight:900;

background:linear-gradient(90deg,#ff6ec4,#7873f5,#42e695,#ff6ec4);
background-size:300% 300%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:gradientMove 6s ease infinite;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.subtitle{
color:#888;
margin-top:10px;
font-size:22px;
}

.list{
max-width:900px;
margin:auto;
padding:20px 30px 80px;
}

.game{
display:flex;
align-items:center;
gap:26px;
padding:34px 0;
border-bottom:1px solid #222;
text-decoration:none;
color:white;
transition:0.2s;
}

.game:active{
transform:scale(0.97);
}

/* 썸네일 */
.thumb{
width:100px;
height:100px;
border-radius:24px;
display:flex;
align-items:center;
justify-content:center;
font-size:46px;

box-shadow:
0 12px 30px rgba(0,0,0,0.6),
inset 0 4px 8px rgba(255,255,255,0.25),
inset 0 -8px 14px rgba(0,0,0,0.25);
}

.text{
flex:1;
}

.game-title{
font-size:30px;
font-weight:800;
}

.game-desc{
font-size:20px;
color:#aaa;
margin-top:6px;
}

.loading{
text-align:center;
padding:60px;
color:#666;
}

</style>

</head>

<body>

<div class="header">
<div class="title">준서 놀이터</div>
<div class="subtitle">오늘은 이 게임 🎮</div>
</div>

<div class="list" id="gameList">
<div class="loading">불러오는 중...</div>
</div>

<script>

const colors=[
"#3b82f6","#9333ea","#ef4444","#f97316",
"#22c55e","#eab308","#06b6d4","#6366f1"
]

fetch("missions.json")
.then(res=>res.json())
.then(data=>{

const list=document.getElementById("gameList")
list.innerHTML=""

/* 안전 처리 */
const games=data.games || []

games.forEach((game,i)=>{

if(!game.active) return

const a=document.createElement("a")
a.href=game.url
a.className="game"

/* 썸네일 */
const thumb=document.createElement("div")
thumb.className="thumb"
thumb.style.background=colors[i%colors.length]

/* 이모지 처리 */
let emoji="🎮"
const first=game.title.trim().split(" ")[0]

if(first.length<=3){
emoji=first
}

thumb.innerText=emoji

/* 텍스트 */
const text=document.createElement("div")
text.className="text"

/* 제목 */
const title=document.createElement("div")
title.className="game-title"

const cleanTitle=game.title.replace(emoji,"").trim()

/* ❗ 제목 없으면 desc로 대체 */
title.innerText=cleanTitle || game.desc

/* 설명 */
const desc=document.createElement("div")
desc.className="game-desc"
desc.innerText=game.desc || ""

text.appendChild(title)
text.appendChild(desc)

a.appendChild(thumb)
a.appendChild(text)

list.appendChild(a)

})

})
.catch(()=>{
document.getElementById("gameList").innerHTML =
"<div class='loading'>불러오기 실패</div>"
})

</script>

</body>
</html>
