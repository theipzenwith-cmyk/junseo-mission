<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>준서 놀이터</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
text-align:center;
}

.header{
padding-top:60px;
}

.title{
font-size:36px;
font-weight:800;
}

.subtitle{
margin-top:10px;
font-size:18px;
color:#aaa;
}

.container{
padding:30px 20px;
max-width:500px;
margin:auto;
}

.card{

display:flex;
align-items:center;
justify-content:center;

height:120px;

border-radius:26px;

font-size:24px;
font-weight:700;

color:white;

text-decoration:none;

margin-bottom:14px;

box-shadow:0 10px 25px rgba(0,0,0,0.4);

animation:colorShift 8s infinite linear;

}

.card:active{
transform:scale(0.97);
}

/* 색이 부드럽게 계속 바뀜 */

@keyframes colorShift {

0%{background:#ef4444;}
20%{background:#f97316;}
40%{background:#eab308;}
60%{background:#22c55e;}
80%{background:#3b82f6;}
100%{background:#8b5cf6;}

}

/* 카드마다 애니메이션 시작 시간 다르게 */

.card:nth-child(1){
animation-delay:0s;
}

.card:nth-child(2){
animation-delay:1s;
}

.card:nth-child(3){
animation-delay:2s;
}

.card:nth-child(4){
animation-delay:3s;
}

</style>

</head>

<body>

<div class="header">

<div class="title">
준서 놀이터
</div>

<div class="subtitle">
재미있는 게임을 골라보세요
</div>

</div>

<div class="container">

<a class="card" href="vision.html">
👁 시력 테스트
</a>

<a class="card" href="color.html">
🎨 색깔 미션
</a>

<a class="card" href="number.html">
🎈 숫자 풍선 찾기
</a>

<a class="card" href="emoji.html">
💥 이모지 터치 게임
</a>

</div>

</body>
</html>
