<!-- 기존 코드 동일, script 부분만 아래로 교체 -->

<script>

/* 게임 */
const colors=[
"#3b82f6","#9333ea","#ef4444","#f97316",
"#22c55e","#eab308","#06b6d4","#6366f1"
]

fetch("missions.json")
.then(res=>res.json())
.then(data=>{
const list=document.getElementById("gameList")
list.innerHTML=""
const games=data.games || []

games.forEach((game,i)=>{
if(!game.active) return

const a=document.createElement("a")
a.href=game.url
a.className="game"

const thumb=document.createElement("div")
thumb.className="thumb"
thumb.style.background=colors[i%colors.length]

let emoji="🎮"
const first=game.title.trim().split(" ")[0]
if(first.length<=3){ emoji=first }

thumb.innerText=emoji

const text=document.createElement("div")
text.className="text"

const title=document.createElement("div")
title.className="game-title"
const cleanTitle=game.title.replace(emoji,"").trim()
title.innerText=cleanTitle || game.desc

const desc=document.createElement("div")
desc.className="game-desc"
desc.innerText=game.desc || ""

text.appendChild(title)
text.appendChild(desc)

a.appendChild(thumb)
a.appendChild(text)

list.appendChild(a)
})
})

/* 프로필 */
const emojis=["🐶","🐱","🐼","🦊","🐰","🐸","🐻","🐯"]
const names=["행복한","용감한","귀여운","똑똑한","빠른","웃는"]

function getProfile(){
  let p = JSON.parse(localStorage.getItem("profile"))
  if(p) return p

  p={
    emoji: emojis[Math.floor(Math.random()*emojis.length)],
    name: names[Math.floor(Math.random()*names.length)]+" 친구"
  }

  localStorage.setItem("profile",JSON.stringify(p))
  return p
}

/* 메모 */
function loadMemo(){
  const memos = JSON.parse(localStorage.getItem("memos") || "[]")
  renderMemo(memos)
}

function addMemo(){
  const text=document.getElementById("memoInput").value.trim()
  if(!text) return

  const memos = JSON.parse(localStorage.getItem("memos") || "[]")
  const profile = getProfile()

  memos.unshift({
    text,
    time:new Date().toLocaleString(),
    emoji:profile.emoji,
    name:profile.name,
    likes:0
  })

  localStorage.setItem("memos",JSON.stringify(memos))
  document.getElementById("memoInput").value=""
  renderMemo(memos)
}

/* 👍 좋아요 */
function likeMemo(i){

  let liked = JSON.parse(localStorage.getItem("liked") || "[]")

  if(liked.includes(i)){
    alert("이미 좋아요 했어요")
    return
  }

  const memos = JSON.parse(localStorage.getItem("memos") || "[]")

  memos[i].likes = (memos[i].likes || 0) + 1

  liked.push(i)

  localStorage.setItem("liked",JSON.stringify(liked))
  localStorage.setItem("memos",JSON.stringify(memos))

  renderMemo(memos)
}

/* 렌더 */
function renderMemo(memos){

  const list=document.getElementById("memoList")
  list.innerHTML=""

  memos.forEach((m,i)=>{

    const div=document.createElement("div")
    div.className="memo"

    div.innerHTML=`
      <div class="profile">
        <span>${m.emoji}</span>
        ${m.name} · ${m.time}
      </div>

      <div style="font-size:18px;">${m.text}</div>

      <div style="margin-top:8px;display:flex;gap:10px;">
        <button onclick="likeMemo(${i})">👍 ${m.likes || 0}</button>
        <button onclick="deleteMemo(${i})" style="background:#ef4444;">삭제</button>
      </div>
    `

    list.appendChild(div)
  })
}

function deleteMemo(i){
  const memos = JSON.parse(localStorage.getItem("memos") || "[]")
  memos.splice(i,1)
  localStorage.setItem("memos",JSON.stringify(memos))
  renderMemo(memos)
}

loadMemo()

</script>
