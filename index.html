<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>준서 놀이터</title>

<style>

body{
margin:0;
background:black;
font-family:-apple-system;
color:white;
}

/* 헤더 */
.header{
padding:60px 24px 20px;
max-width:900px;
margin:auto;
}

.title{
font-size:46px;
font-weight:900;
background:linear-gradient(90deg,#ff6ec4,#7873f5,#42e695,#ff6ec4);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
color:#888;
margin-top:10px;
font-size:18px;
}

/* 리스트 */
.list{
max-width:900px;
margin:auto;
padding:20px 24px;
}

.game{
display:flex;
gap:20px;
padding:28px 0;
border-bottom:1px solid #222;
text-decoration:none;
color:white;
}

.thumb{
width:90px;
height:90px;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
}

.text{flex:1;}

.game-title{
font-size:24px;
font-weight:800;
}

.game-desc{
font-size:16px;
color:#aaa;
margin-top:4px;
}

/* 메모 */
.memo-wrap{
max-width:900px;
margin:auto;
padding:20px 24px 80px;
}

.memo-input{
display:flex;
gap:10px;
margin-bottom:20px;
}

.memo-input input{
flex:1;
background:#222;
border:none;
border-radius:14px;
padding:16px;
font-size:16px;
color:white;
outline:none;
}

.memo-input input::placeholder{
color:rgba(255,255,255,0.5);
}

.send-btn{
width:52px;
height:52px;
border-radius:50%;
background:#333;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
cursor:pointer;
}

.memo{
background:#1a1a1a;
padding:16px;
border-radius:14px;
margin-bottom:12px;
}

.profile{
display:flex;
gap:8px;
align-items:center;
font-size:13px;
color:#aaa;
margin-bottom:6px;
}

.profile span{
font-size:18px;
}

.memo-text{
font-size:16px;
line-height:1.4;
}

.memo-actions{
margin-top:8px;
font-size:14px;
color:#ccc;
display:flex;
gap:10px;
}

/* 좋아요 */
.like{
cursor:pointer;
}

.loading{
text-align:center;
padding:60px;
color:#666;
}

</style>

</head>

<body>

<div class="header">
<div class="title">준서 놀이터</div>
<div class="subtitle">오늘은 이 게임 🎮</div>
</div>

<div class="list" id="gameList">
<div class="loading">불러오는 중...</div>
</div>

<div class="memo-wrap">

<h2>📝 준서에게 한마디</h2>

<div class="memo-input">
<input id="memoInput" placeholder="준서에게 메모 남기기">
<div class="send-btn" onclick="addMemo()">✈️</div>
</div>

<div id="memoList"></div>

</div>

<script>

/* 게임 */
const colors=[
"#3b82f6","#9333ea","#ef4444","#f97316",
"#22c55e","#eab308","#06b6d4","#6366f1"
]

async function loadGames(){
  try{
    const res = await fetch("missions.json")
    const data = await res.json()

    const list=document.getElementById("gameList")
    list.innerHTML=""

    const games=data.games || []

    games.forEach((game,i)=>{

      if(!game.active) return

      const a=document.createElement("a")
      a.href=game.url
      a.className="game"

      const thumb=document.createElement("div")
      thumb.className="thumb"
      thumb.style.background=colors[i%colors.length]

      let emoji="🎮"
      const first=game.title?.split(" ")[0]
      if(first && first.length<=3) emoji=first

      thumb.innerText=emoji

      const text=document.createElement("div")
      text.className="text"

      text.innerHTML=`
        <div class="game-title">${game.title.replace(emoji,"")}</div>
        <div class="game-desc">${game.desc || ""}</div>
      `

      a.appendChild(thumb)
      a.appendChild(text)

      list.appendChild(a)
    })

  }catch{
    document.getElementById("gameList").innerHTML =
    "<div class='loading'>불러오기 실패</div>"
  }
}

/* 프로필 */
function getProfile(){
  try{
    let p = JSON.parse(localStorage.getItem("profile"))
    if(p) return p
  }catch{}

  const emojis=["🐶","🐱","🐼","🦊","🐰","🐸","🐻","🐯"]
  const names=["행복한","용감한","귀여운","똑똑한","빠른","웃는"]

  const p={
    emoji: emojis[Math.floor(Math.random()*emojis.length)],
    name: names[Math.floor(Math.random()*names.length)]+" 친구"
  }

  localStorage.setItem("profile",JSON.stringify(p))
  return p
}

/* 메모 */
function loadMemo(){
  try{
    const memos = JSON.parse(localStorage.getItem("memos") || "[]")
    renderMemo(memos)
  }catch{
    renderMemo([])
  }
}

function addMemo(){
  const input=document.getElementById("memoInput")
  const text=input.value.trim()
  if(!text) return

  let memos = JSON.parse(localStorage.getItem("memos") || "[]")
  const profile = getProfile()

  memos.unshift({
    text,
    time:new Date().toLocaleString(),
    emoji:profile.emoji,
    name:profile.name,
    likes:0
  })

  localStorage.setItem("memos",JSON.stringify(memos))
  input.value=""
  renderMemo(memos)
}

/* 좋아요 */
function likeMemo(i){
  let memos = JSON.parse(localStorage.getItem("memos") || "[]")
  memos[i].likes = (memos[i].likes || 0) + 1
  localStorage.setItem("memos",JSON.stringify(memos))
  renderMemo(memos)
}

/* 롱탭 삭제 */
function longPressDelete(el,i){
  let timer

  el.addEventListener("touchstart",()=>{
    timer=setTimeout(()=>{
      let memos = JSON.parse(localStorage.getItem("memos") || "[]")
      memos.splice(i,1)
      localStorage.setItem("memos",JSON.stringify(memos))
      renderMemo(memos)
    },800)
  })

  el.addEventListener("touchend",()=>{
    clearTimeout(timer)
  })
}

/* 렌더 */
function renderMemo(memos){

  const list=document.getElementById("memoList")
  list.innerHTML=""

  memos.forEach((m,i)=>{

    const div=document.createElement("div")
    div.className="memo"

    div.innerHTML=`
      <div class="profile">
        <span>${m.emoji}</span>
        ${m.name} · ${m.time}
      </div>

      <div class="memo-text">${m.text}</div>

      <div class="memo-actions">
        <div class="like" onclick="likeMemo(${i})">👍 ${m.likes || 0}</div>
      </div>
    `

    longPressDelete(div,i)

    list.appendChild(div)
  })
}

loadGames()
loadMemo()

</script>

</body>
</html>
