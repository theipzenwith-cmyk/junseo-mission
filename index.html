<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>준서 놀이터</title>

<style>

body{
margin:0;
height:100vh;
background:radial-gradient(circle at 20% 20%, #1e293b 0%, #000000 60%);
color:white;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
text-align:center;
overflow-x:hidden;
}

/* 우주 별 배경 */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background-image:
radial-gradient(2px 2px at 20% 30%, white, transparent),
radial-gradient(2px 2px at 70% 40%, white, transparent),
radial-gradient(2px 2px at 50% 80%, white, transparent),
radial-gradient(2px 2px at 90% 20%, white, transparent);

opacity:0.4;
pointer-events:none;
}

.header{
padding-top:60px;
}

.title{
font-size:36px;
font-weight:800;
}

.subtitle{
margin-top:10px;
font-size:18px;
color:#aaa;
}

.container{
padding:30px 20px;
max-width:520px;
margin:auto;
}

/* 카드 */

.card{

display:flex;
align-items:center;
justify-content:center;

height:90px;

border-radius:26px;

font-size:22px;
font-weight:700;

color:white;

text-decoration:none;

margin-bottom:14px;

background:linear-gradient(
45deg,
#ef4444,
#f97316,
#eab308,
#22c55e,
#3b82f6,
#8b5cf6
);

background-size:400% 400%;

animation:gradientMove 10s ease infinite;

box-shadow:
0 20px 40px rgba(0,0,0,0.6),
0 0 20px rgba(255,255,255,0.15);

transition:transform .15s;

}

.card:active{
transform:scale(0.96);
}

/* 카드마다 색 변화 타이밍 다르게 */

.card:nth-child(2){
animation-duration:12s;
}

.card:nth-child(3){
animation-duration:14s;
}

.card:nth-child(4){
animation-duration:16s;
}

.card:nth-child(5){
animation-duration:18s;
}

/* 색 변화 */

@keyframes gradientMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

</style>

</head>

<body>

<div class="header">

<div class="title">
준서 놀이터
</div>

<div class="subtitle">
재미있는 게임을 골라보세요
</div>

</div>

<div class="container">

<a class="card" href="vision.html">
👁 시력 테스트
</a>

<a class="card" href="color.html">
🎨 색깔 미션
</a>

<a class="card" href="number.html">
🎈 숫자 풍선 찾기
</a>

<a class="card" href="emoji.html">
💥 이모지 터치 게임
</a>

<a class="card" href="trace.html">
✏️ 선따라 그리기
</a>

</div>

</body>
</html>
