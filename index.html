<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>준서 놀이터</title>

<style>

body{
margin:0;
background:black;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
color:white;
}

/* 상단 */

.header{
padding:60px 30px 20px 30px;
max-width:900px;
margin:auto;
}

.title{
font-size:48px;
font-weight:800;
}

.subtitle{
color:#888;
margin-top:10px;
font-size:22px;
}

/* 리스트 */

.list{
max-width:900px;
margin:auto;
padding:20px 30px 60px 30px;
}

/* 카드 */

.game{

display:flex;
align-items:center;

gap:26px;

padding:30px 0;

border-bottom:1px solid #222;

text-decoration:none;
color:white;

}

/* 썸네일 */

.thumb{

width:96px;
height:96px;

border-radius:22px;

display:flex;
align-items:center;
justify-content:center;

font-size:44px;

color:white;

box-shadow:
0 10px 24px rgba(0,0,0,0.6),
inset 0 4px 8px rgba(255,255,255,0.25),
inset 0 -8px 14px rgba(0,0,0,0.25);

}

/* 텍스트 */

.text{
flex:1;
}

.game-title{
font-size:28px;
font-weight:800;
}

.game-desc{
font-size:20px;
color:#aaa;
margin-top:6px;
}

</style>

</head>

<body>

<div class="header">

<div class="title">준서 놀이터</div>
<div class="subtitle">오늘은 이 게임</div>

</div>

<div class="list" id="gameList"></div>

<script>

const colors=[

"#3b82f6",
"#9333ea",
"#ef4444",
"#f97316",
"#22c55e",
"#eab308",
"#06b6d4",
"#6366f1"

]

fetch("missions.json")
.then(res=>res.json())
.then(data=>{

const list=document.getElementById("gameList")

data.games.forEach(game=>{

if(!game.active) return

const a=document.createElement("a")
a.href=game.url
a.className="game"

/* 썸네일 */

const thumb=document.createElement("div")
thumb.className="thumb"

const color=colors[Math.floor(Math.random()*colors.length)]

thumb.style.background=color

const emoji=game.title.split(" ")[0]

thumb.innerText=emoji

/* 텍스트 */

const text=document.createElement("div")
text.className="text"

const title=document.createElement("div")
title.className="game-title"
title.innerText=game.title.replace(emoji,"").trim()

const desc=document.createElement("div")
desc.className="game-desc"
desc.innerText=game.desc || ""

text.appendChild(title)
text.appendChild(desc)

a.appendChild(thumb)
a.appendChild(text)

list.appendChild(a)

})

})

</script>

</body>
</html>
