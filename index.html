<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>준서 놀이터</title>

<style>

body{
margin:0;
background:black;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
color:white;
text-align:center;
}

/* 제목 */

.title{
margin-top:50px;
font-size:34px;
font-weight:800;
}

/* GRID */

.grid{

margin-top:40px;

display:grid;

grid-template-columns:repeat(2,1fr);

gap:30px;

padding:30px;

max-width:900px;
margin-left:auto;
margin-right:auto;

}

/* 큰 폰 */

@media(min-width:600px){

.grid{
grid-template-columns:repeat(3,1fr);
}

}

/* 아이패드 */

@media(min-width:1000px){

.grid{
grid-template-columns:repeat(4,1fr);
}

}

/* APP */

.app{

display:flex;
flex-direction:column;
align-items:center;

text-decoration:none;
color:white;

}

/* ICON */

.icon{

width:120px;
height:120px;

border-radius:28px;

display:flex;
align-items:center;
justify-content:center;

font-size:55px;

box-shadow:
0 10px 25px rgba(0,0,0,0.5),
inset 0 2px 4px rgba(255,255,255,0.2);

transition:transform .15s;

}

.icon:active{
transform:scale(0.9);
}

/* LABEL */

.label{

margin-top:12px;

font-size:17px;

}

</style>

</head>

<body>

<div class="title">준서 놀이터</div>

<div class="grid" id="gameGrid"></div>

<script>

const colors=[

"#3b82f6",
"#9333ea",
"#ef4444",
"#f97316",
"#22c55e",
"#eab308",
"#06b6d4",
"#6366f1"

]

fetch("missions.json")
.then(res=>res.json())
.then(data=>{

const grid=document.getElementById("gameGrid")

data.games.forEach(game=>{

if(!game.active) return

const a=document.createElement("a")
a.href=game.url
a.className="app"

/* icon */

const icon=document.createElement("div")
icon.className="icon"

const color=colors[Math.floor(Math.random()*colors.length)]

icon.style.background=color

const emoji=game.title.split(" ")[0]

icon.innerText=emoji

/* label */

const label=document.createElement("div")
label.className="label"

label.innerText=game.title.replace(emoji,"").trim()

a.appendChild(icon)
a.appendChild(label)

grid.appendChild(a)

})

})

</script>

</body>
</html>
