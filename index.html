<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>준서 놀이터</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  text-align:center;
}

.header{
  padding-top:60px;
}

.title{
  font-size:36px;
  font-weight:800;
}

.subtitle{
  margin-top:10px;
  font-size:18px;
  color:#aaa;
}

.container{
  padding:30px 20px 50px;
  max-width:700px;
  margin:0 auto;
}

.card{
  display:flex;
  align-items:center;
  justify-content:center;
  height:140px;
  border-radius:26px;
  font-size:24px;
  font-weight:700;
  color:white;
  text-decoration:none;
  margin-bottom:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
  transition:transform .15s ease, opacity .15s ease;
}

.card:active{
  transform:scale(0.97);
}

.footer{
  margin-top:12px;
  color:#777;
  font-size:14px;
}
</style>

</head>

<body>

<div class="header">
  <div class="title">준서 놀이터</div>
  <div class="subtitle">재미있게 배우는 미니 게임</div>
</div>

<div class="container">
  <a class="card" href="vision.html" id="card1">시력 테스트</a>
  <a class="card" href="color.html" id="card2">색깔 미션</a>
  <a class="card" href="number.html" id="card3">숫자 풍선 팡</a>

  <div class="footer">준서가 재미있게 놀 수 있는 게임을 하나씩 추가해요</div>
</div>

<script>
const colors = [
  "linear-gradient(135deg,#ff6b6b,#ff8e53)",
  "linear-gradient(135deg,#36d1dc,#5b86e5)",
  "linear-gradient(135deg,#a18cd1,#fbc2eb)",
  "linear-gradient(135deg,#f7971e,#ffd200)",
  "linear-gradient(135deg,#11998e,#38ef7d)",
  "linear-gradient(135deg,#fc466b,#3f5efb)",
  "linear-gradient(135deg,#8e2de2,#4a00e0)"
];

document.querySelectorAll(".card").forEach((card, index) => {
  card.style.background = colors[index % colors.length];
});
</script>

</body>
</html>
