<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>숫자 찾기 게임</title>

<style>

body{
margin:0;
background:#071a3a;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
color:white;
text-align:center;
overflow:hidden;
}

.home{
position:absolute;
top:20px;
left:20px;

width:50px;
height:50px;

border-radius:50%;
background:rgba(255,255,255,.14);

display:flex;
align-items:center;
justify-content:center;

font-size:24px;
cursor:pointer;
}

.title{
margin-top:40px;
font-size:34px;
font-weight:800;
}

.mission{
margin-top:10px;
font-size:28px;
color:#ffd166;
font-weight:700;
}

#game{
position:relative;
width:100vw;
height:80vh;
}

.ball{

position:absolute;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-weight:800;
color:white;

cursor:pointer;

box-shadow:
0 10px 20px rgba(0,0,0,.35),
inset 0 6px 10px rgba(255,255,255,.15);

}

.pop{
animation:pop .25s forwards;
}

@keyframes pop{

0%{transform:scale(1)}
40%{transform:scale(1.3)}
100%{transform:scale(0);opacity:0}

}

/* 카운트 */

#count{

position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);

font-size:80px;
font-weight:900;

opacity:.9;

}

</style>

</head>

<body>

<div class="home" onclick="location.href='index.html'">✕</div>

<div class="title">숫자 찾기 게임</div>

<div class="mission" id="mission"></div>

<div id="game"></div>

<div id="count"></div>

<script>

const game=document.getElementById("game")
const mission=document.getElementById("mission")
const countEl=document.getElementById("count")

let balls=[]
let stage=1
let target=0
let previousTarget=null

const stageCount=[5,7,10,15,20,25,30]

const colors=[
"#ff595e","#ff924c","#ffca3a",
"#8ac926","#52b788","#1982c4","#6a4c93"
]

const popSound=new Audio("https://assets.mixkit.co/sfx/preview/mixkit-balloon-pop-1980.mp3")

const beep=new Audio("https://assets.mixkit.co/sfx/preview/mixkit-game-beep-1991.mp3")

function speak(text){

const msg=new SpeechSynthesisUtterance(text)

msg.lang="ko-KR"

speechSynthesis.cancel()
speechSynthesis.speak(msg)

}

/* 랜덤 숫자 */

function uniqueNumbers(total){

const nums=[]

while(nums.length<total){

let n=Math.floor(Math.random()*30)+1

if(!nums.includes(n)) nums.push(n)

}

return nums

}

/* 목표 숫자 */

function pickTarget(nums){

let t

do{

t=nums[Math.floor(Math.random()*nums.length)]

}while(t===previousTarget)

previousTarget=t

return t

}

/* 단계 시작 */

function startStage(){

game.innerHTML=""
balls=[]

let total=stageCount[stage-1]

let nums=uniqueNumbers(total)

target=pickTarget(nums)

mission.innerText=target+"을 빠르게 찾으시오"

speak(target+"을 빠르게 찾으시오")

let size=100-stage*8
if(size<40)size=40

nums.forEach(n=>spawn(n,size))

startCountdown()

}

/* 생성 */

function spawn(num,size){

let el=document.createElement("div")

el.className="ball"

el.innerText=num

el.style.width=size+"px"
el.style.height=size+"px"

el.style.fontSize=size/3+"px"

el.style.background=colors[Math.floor(Math.random()*colors.length)]

let x=Math.random()*(window.innerWidth-size)
let y=Math.random()*(window.innerHeight-200)

let vx=(Math.random()-.5)*0.6
let vy=(Math.random()-.5)*0.6

el.style.left=x+"px"
el.style.top=y+"px"

game.appendChild(el)

let obj={el,x,y,vx,vy,size,num}

el.onclick=()=>{

if(num===target){

popSound.currentTime=0
popSound.play()

el.classList.add("pop")

setTimeout(()=>el.remove(),200)

stage++

if(stage>stageCount.length) stage=1

setTimeout(startStage,500)

}

}

balls.push(obj)

}

/* 움직임 */

function update(){

for(let b of balls){

b.x+=b.vx
b.y+=b.vy

if(b.x<0||b.x+b.size>window.innerWidth) b.vx*=-1
if(b.y<0||b.y+b.size>window.innerHeight) b.vy*=-1

}

/* 충돌 */

for(let i=0;i<balls.length;i++){

for(let j=i+1;j<balls.length;j++){

let a=balls[i]
let b=balls[j]

let dx=b.x-a.x
let dy=b.y-a.y

let dist=Math.sqrt(dx*dx+dy*dy)

let min=a.size

if(dist<min){

let angle=Math.atan2(dy,dx)

let overlap=min-dist

let pushX=Math.cos(angle)*(overlap/2)
let pushY=Math.sin(angle)*(overlap/2)

a.x-=pushX
a.y-=pushY

b.x+=pushX
b.y+=pushY

}

}

}

balls.forEach(b=>{

b.el.style.left=b.x+"px"
b.el.style.top=b.y+"px"

})

requestAnimationFrame(update)

}

/* 카운트다운 */

function startCountdown(){

let time=(stage>=5)?7:5

countEl.innerText=time

let interval=setInterval(()=>{

beep.currentTime=0
beep.play()

time--

if(time<=0){

clearInterval(interval)

countEl.innerText=""

stage++

if(stage>stageCount.length) stage=1

setTimeout(startStage,400)

}else{

countEl.innerText=time

}

},1000)

}

startStage()
update()

</script>

</body>
</html>
