<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>숫자 찾기 게임</title>

<style>

body{
margin:0;
background:#06142b;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
color:white;
text-align:center;
overflow:hidden;
}

/* 홈 버튼 */

.homeBtn{

position:absolute;
top:20px;
left:20px;

width:44px;
height:44px;

border-radius:50%;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);

display:flex;
align-items:center;
justify-content:center;

font-size:22px;
font-weight:bold;

cursor:pointer;

z-index:100;

}

.homeBtn:active{
transform:scale(.9);
}

/* 제목 */

.title{
margin-top:40px;
font-size:32px;
font-weight:800;
}

/* 미션 */

.mission{
margin-top:10px;
font-size:26px;
color:#ffd54f;
font-weight:700;
}

/* 게임 영역 */

#game{

position:relative;

width:100vw;
height:85vh;

overflow:hidden;

}

/* 풍선 */

.balloon{

position:absolute;

display:flex;
align-items:center;
justify-content:center;

border-radius:50%;

font-weight:800;
color:white;

cursor:pointer;

user-select:none;

box-shadow:

inset -8px -10px rgba(0,0,0,.15),
inset 10px 10px rgba(255,255,255,.2),
0 10px 20px rgba(0,0,0,.3);

}

/* 풍선 꼬리 */

.balloon::after{

content:"";

position:absolute;

bottom:-14px;

width:0;
height:0;

border-left:8px solid transparent;
border-right:8px solid transparent;
border-top:14px solid rgba(255,255,255,.9);

}

/* 터지는 애니메이션 */

.pop{
animation:pop .25s forwards;
}

@keyframes pop{

0%{transform:scale(1)}
40%{transform:scale(1.3)}
100%{transform:scale(0);opacity:0}

}

/* 파편 */

.particle{

position:absolute;
width:8px;
height:8px;
border-radius:50%;

pointer-events:none;

animation:burst .5s forwards;

}

@keyframes burst{

0%{opacity:1}
100%{transform:translate(var(--x),var(--y));opacity:0}

}

</style>

</head>

<body>

<div class="homeBtn" onclick="location.href='index.html'">
✕
</div>

<div class="title">
숫자 찾기 게임
</div>

<div class="mission" id="mission">
3을 빠르게 찾으세요
</div>

<div id="game"></div>

<script>

const game=document.getElementById("game")
const mission=document.getElementById("mission")

let balloons=[]
let level=1
let target=0
let remaining=0

const colors=[
"#ff5252","#ff9800","#ffd740","#00e676",
"#00e5ff","#448aff","#7c4dff","#ff4081"
]

const popSound=new Audio("https://assets.mixkit.co/sfx/preview/mixkit-balloon-pop-1980.mp3")

function speak(t){

if(!speechSynthesis)return

const s=new SpeechSynthesisUtterance(t)

s.lang="ko-KR"

speechSynthesis.cancel()
speechSynthesis.speak(s)

}

/* 라운드 시작 */

function startRound(){

game.innerHTML=""
balloons=[]

let max=level<3?9:level<5?20:99

target=Math.floor(Math.random()*max)+1

mission.innerText=target+"를 빠르게 찾으세요"

speak(target)

let total=10+level*4

remaining=Math.floor(total/4)

let size=90-level*5

if(size<40)size=40

for(let i=0;i<total;i++){

let num=Math.floor(Math.random()*max)+1

if(i<remaining)num=target

spawnBalloon(num,size)

}

}

/* 풍선 생성 */

function spawnBalloon(num,size){

let el=document.createElement("div")

el.className="balloon"

el.innerText=num

el.style.width=size+"px"
el.style.height=size+"px"

el.style.fontSize=size/3+"px"

el.style.background=colors[Math.floor(Math.random()*colors.length)]

let x=Math.random()*(window.innerWidth-size)
let y=Math.random()*(window.innerHeight-200)

let vx=(Math.random()*2-1)*1.5
let vy=(Math.random()*2-1)*1.5

el.style.left=x+"px"
el.style.top=y+"px"

game.appendChild(el)

let obj={el,x,y,vx,vy,size,num}

el.onclick=()=>{

if(num==target){

popSound.currentTime=0
popSound.play()

explode(x,y,el.style.background)

el.classList.add("pop")

speak(num)

remaining--

setTimeout(()=>el.remove(),200)

if(remaining==0){

level++

setTimeout(startRound,700)

}

}else{

speak("다시")

}

}

balloons.push(obj)

}

/* 파편 효과 */

function explode(x,y,color){

for(let i=0;i<10;i++){

let p=document.createElement("div")

p.className="particle"

p.style.background=color

p.style.left=x+"px"
p.style.top=y+"px"

p.style.setProperty("--x",(Math.random()*80-40)+"px")
p.style.setProperty("--y",(Math.random()*80-40)+"px")

document.body.appendChild(p)

setTimeout(()=>p.remove(),500)

}

}

/* 물리 업데이트 */

function update(){

for(let b of balloons){

b.x+=b.vx
b.y+=b.vy

if(b.x<0||b.x+b.size>window.innerWidth){

b.vx*=-1

}

if(b.y<0||b.y+b.size>window.innerHeight){

b.vy*=-1

}

}

/* 풍선 충돌 */

for(let i=0;i<balloons.length;i++){

for(let j=i+1;j<balloons.length;j++){

let a=balloons[i]
let b=balloons[j]

let dx=a.x-b.x
let dy=a.y-b.y

let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<a.size){

let temp=a.vx
a.vx=b.vx
b.vx=temp

temp=a.vy
a.vy=b.vy
b.vy=temp

}

}

}

for(let b of balloons){

b.el.style.left=b.x+"px"
b.el.style.top=b.y+"px"

}

requestAnimationFrame(update)

}

startRound()
update()

</script>

</body>
</html>
