<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>숫자 찾기 게임</title>

<style>
body{
  margin:0;
  background:#071a3a;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  color:white;
  text-align:center;
  overflow:hidden;
}

.home{
  position:absolute;
  top:20px;
  left:20px;
  width:50px;
  height:50px;
  border-radius:50%;
  background:rgba(255,255,255,.14);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  cursor:pointer;
  z-index:20;
  backdrop-filter:blur(8px);
}

.title{
  margin-top:40px;
  font-size:34px;
  font-weight:800;
}

.mission{
  margin-top:10px;
  font-size:28px;
  color:#ffd166;
  font-weight:800;
  padding:0 18px;
}

.stageText{
  margin-top:8px;
  font-size:16px;
  color:rgba(255,255,255,.72);
  font-weight:600;
}

#game{
  position:relative;
  width:100vw;
  height:82vh;
  overflow:hidden;
}

.ball{
  position:absolute;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  color:white;
  cursor:pointer;
  user-select:none;
  box-shadow:
    0 10px 24px rgba(0,0,0,.32),
    inset 0 10px 14px rgba(255,255,255,.14);
  transform-origin:center;
}

.ball::before{
  content:"";
  position:absolute;
  top:14%;
  left:20%;
  width:22%;
  height:22%;
  border-radius:50%;
  background:rgba(255,255,255,.18);
  filter:blur(1px);
}

.ball:active{
  transform:scale(.94);
}

.pop{
  animation:pop .22s forwards;
}

@keyframes pop{
  0%{transform:scale(1);}
  45%{transform:scale(1.18);}
  100%{transform:scale(0);opacity:0;}
}
</style>
</head>
<body>

<div class="home" onclick="location.href='index.html'">✕</div>

<div class="title">숫자 찾기 게임</div>
<div class="mission" id="mission"></div>
<div class="stageText" id="stageText"></div>

<div id="game"></div>

<script>
const game = document.getElementById("game");
const mission = document.getElementById("mission");
const stageText = document.getElementById("stageText");

let balls = [];
let stage = 1;
let target = 0;
let previousTarget = null;
let isTransitioning = false;

const stageCount = [5, 7, 10, 15, 20, 25, 30];
const stageMaxNumber = [9, 12, 20, 30, 50, 70, 99];

const colors = [
  "#ff595e", "#ff924c", "#ffca3a",
  "#8ac926", "#52b788", "#1982c4", "#6a4c93"
];

const popSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-balloon-pop-1980.mp3");

function speak(text){
  if(!("speechSynthesis" in window)) return;
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = "ko-KR";
  msg.rate = 0.95;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(msg);
}

function pickUniqueNumbers(total, max){
  const nums = [];
  while(nums.length < total){
    const n = Math.floor(Math.random() * max) + 1;
    if(!nums.includes(n)) nums.push(n);
  }
  return nums;
}

function pickTarget(nums){
  let next;
  do{
    next = nums[Math.floor(Math.random() * nums.length)];
  }while(nums.length > 1 && next === previousTarget);

  previousTarget = next;
  return next;
}

function getBallSize(currentStage){
  if(currentStage === 1) return 102;
  if(currentStage === 2) return 94;
  if(currentStage === 3) return 84;
  if(currentStage === 4) return 74;
  if(currentStage === 5) return 64;
  if(currentStage === 6) return 58;
  return 52;
}

function startStage(){
  isTransitioning = false;
  game.innerHTML = "";
  balls = [];

  const total = stageCount[stage - 1];
  const maxNum = stageMaxNumber[stage - 1];
  const size = getBallSize(stage);

  const nums = pickUniqueNumbers(total, maxNum);
  target = pickTarget(nums);

  mission.textContent = `${target}를 빠르게 찾으시오`;
  stageText.textContent = `${stage}단계 · 원 ${total}개`;

  speak(`${target}를 빠르게 찾으시오`);

  nums.forEach(num => spawnBall(num, size));
}

function isOverlapping(x, y, size){
  for(const b of balls){
    const ax = x + size / 2;
    const ay = y + size / 2;
    const bx = b.x + b.size / 2;
    const by = b.y + b.size / 2;
    const dx = ax - bx;
    const dy = ay - by;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const minDist = (size + b.size) / 2 + 8;
    if(dist < minDist) return true;
  }
  return false;
}

function findSpawnPosition(size){
  const areaTop = 120;
  const bottomPadding = 24;
  const maxX = window.innerWidth - size;
  const maxY = window.innerHeight - areaTop - bottomPadding - size;

  let x = 0;
  let y = 0;

  for(let i = 0; i < 500; i++){
    x = Math.random() * Math.max(10, maxX);
    y = areaTop + Math.random() * Math.max(10, maxY);
    if(!isOverlapping(x, y, size)){
      return { x, y };
    }
  }

  return { x, y };
}

function spawnBall(num, size){
  const el = document.createElement("div");
  el.className = "ball";
  el.textContent = num;
  el.style.width = size + "px";
  el.style.height = size + "px";
  el.style.fontSize = Math.max(22, size * 0.34) + "px";
  el.style.background = colors[Math.floor(Math.random() * colors.length)];

  const pos = findSpawnPosition(size);
  const x = pos.x;
  const y = pos.y;

  const vx = (Math.random() - 0.5) * 0.32;
  const vy = (Math.random() - 0.5) * 0.32;
  const phase = Math.random() * Math.PI * 2;

  el.style.left = x + "px";
  el.style.top = y + "px";
  game.appendChild(el);

  const obj = { el, x, y, vx, vy, size, num, phase };

  el.onclick = () => {
    if(isTransitioning) return;
    if(num !== target) return;

    isTransitioning = true;

    popSound.currentTime = 0;
    popSound.play().catch(() => {});
    el.classList.add("pop");

    setTimeout(() => {
      el.remove();
    }, 180);

    stage++;
    if(stage > 7) stage = 1;

    setTimeout(() => {
      startStage();
    }, 420);
  };

  balls.push(obj);
}

function update(time){
  const width = window.innerWidth;
  const height = window.innerHeight;

  for(const b of balls){
    const organicX = Math.sin(time * 0.001 + b.phase) * 0.10;
    const organicY = Math.cos(time * 0.0012 + b.phase * 1.17) * 0.10;

    b.x += b.vx + organicX;
    b.y += b.vy + organicY;

    if(b.x < 0){
      b.x = 0;
      b.vx *= -1;
    }
    if(b.x + b.size > width){
      b.x = width - b.size;
      b.vx *= -1;
    }
    if(b.y < 0){
      b.y = 0;
      b.vy *= -1;
    }
    if(b.y + b.size > height){
      b.y = height - b.size;
      b.vy *= -1;
    }
  }

  for(let i = 0; i < balls.length; i++){
    for(let j = i + 1; j < balls.length; j++){
      const a = balls[i];
      const b = balls[j];

      const ax = a.x + a.size / 2;
      const ay = a.y + a.size / 2;
      const bx = b.x + b.size / 2;
      const by = b.y + b.size / 2;

      let dx = bx - ax;
      let dy = by - ay;
      let dist = Math.sqrt(dx * dx + dy * dy);

      const minDist = (a.size + b.size) / 2 + 4;

      if(dist === 0){
        dx = 0.1;
        dy = 0.1;
        dist = 0.14;
      }

      if(dist < minDist){
        const nx = dx / dist;
        const ny = dy / dist;
        const overlap = minDist - dist;

        a.x -= nx * overlap * 0.5;
        a.y -= ny * overlap * 0.5;
        b.x += nx * overlap * 0.5;
        b.y += ny * overlap * 0.5;

        const tension = 0.028;
        a.vx -= nx * tension;
        a.vy -= ny * tension;
        b.vx += nx * tension;
        b.vy += ny * tension;
      }
    }
  }

  for(const b of balls){
    b.vx *= 0.998;
    b.vy *= 0.998;
    b.el.style.left = b.x + "px";
    b.el.style.top = b.y + "px";
  }

  requestAnimationFrame(update);
}

startStage();
requestAnimationFrame(update);
</script>

</body>
</html>
