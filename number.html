<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>숫자 찾기 게임</title>

<style>

body{
margin:0;
background:#071a3a;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
color:white;
text-align:center;
overflow:hidden;
}

/* 홈 버튼 */

.home{

position:absolute;
top:20px;
left:20px;

width:48px;
height:48px;

border-radius:50%;
background:rgba(255,255,255,.15);

display:flex;
align-items:center;
justify-content:center;

font-size:24px;
cursor:pointer;

z-index:10;

}

/* 제목 */

.title{
margin-top:40px;
font-size:34px;
font-weight:800;
}

/* 미션 */

.mission{
margin-top:10px;
font-size:28px;
color:#ffd166;
font-weight:700;
}

.stage{
margin-top:6px;
font-size:15px;
opacity:.8;
}

/* 게임 영역 */

#game{
position:relative;
width:100vw;
height:80vh;
}

/* 시작 버튼 */

.startBtn{

position:absolute;
bottom:40px;
left:50%;

transform:translateX(-50%);

background:#ffd166;
color:#000;

padding:16px 28px;

border-radius:30px;

font-weight:800;
font-size:18px;

cursor:pointer;

box-shadow:0 6px 20px rgba(0,0,0,.35);

}

/* 숫자 원 */

.ball{

position:absolute;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-weight:800;
color:white;

cursor:pointer;

box-shadow:
0 10px 24px rgba(0,0,0,.35),
inset 0 10px 14px rgba(255,255,255,.15);

}

/* 터짐 */

.pop{
animation:pop .25s forwards;
}

@keyframes pop{

0%{transform:scale(1)}
40%{transform:scale(1.3)}
100%{transform:scale(0);opacity:0}

}

</style>

</head>

<body>

<div class="home" onclick="location.href='index.html'">✕</div>

<div class="title">숫자 찾기 게임</div>

<div class="mission" id="mission"></div>
<div class="stage" id="stageText"></div>

<div id="game"></div>

<div id="startBtn" class="startBtn">시작하기</div>

<script>

const game=document.getElementById("game")
const mission=document.getElementById("mission")
const stageText=document.getElementById("stageText")
const startBtn=document.getElementById("startBtn")

let balls=[]
let stage=1
let target=0
let previousTarget=null

let tiltX=0
let tiltY=0

const stageCount=[5,7,10,15,20,25,30]

const colors=[
"#ff595e","#ff924c","#ffca3a",
"#8ac926","#52b788","#1982c4","#6a4c93"
]

const popSound=new Audio("https://assets.mixkit.co/sfx/preview/mixkit-balloon-pop-1980.mp3")

/* 음성 */

function speak(text){

const msg=new SpeechSynthesisUtterance(text)

msg.lang="ko-KR"

speechSynthesis.cancel()
speechSynthesis.speak(msg)

}

/* 자이로 시작 */

function enableGyro(){

window.addEventListener("deviceorientation",(e)=>{

tiltX=e.gamma*0.05
tiltY=e.beta*0.05

})

}

/* 시작 버튼 */

startBtn.onclick=async()=>{

startBtn.style.display="none"

/* 아이폰 센서 권한 */

if(typeof DeviceOrientationEvent.requestPermission==="function"){

const permission=await DeviceOrientationEvent.requestPermission()

if(permission==="granted") enableGyro()

}else{

enableGyro()

}

startStage()

}

/* 숫자 생성 */

function uniqueNumbers(total){

const nums=[]

while(nums.length<total){

let n=Math.floor(Math.random()*99)+1

if(!nums.includes(n)) nums.push(n)

}

return nums

}

/* 목표 숫자 */

function pickTarget(nums){

let t

do{

t=nums[Math.floor(Math.random()*nums.length)]

}while(t===previousTarget)

previousTarget=t

return t

}

/* 단계 시작 */

function startStage(){

game.innerHTML=""
balls=[]

let total=stageCount[stage-1]

let nums=uniqueNumbers(total)

target=pickTarget(nums)

mission.innerText=target+"를 빠르게 찾으시오"

stageText.innerText=stage+"단계 · "+total+"개"

speak(target+"를 빠르게 찾으시오")

let size=100-stage*7
if(size<40)size=40

nums.forEach(n=>spawn(n,size))

}

/* 생성 */

function spawn(num,size){

let el=document.createElement("div")

el.className="ball"

el.innerText=num

el.style.width=size+"px"
el.style.height=size+"px"

el.style.fontSize=size/3+"px"

el.style.background=colors[Math.floor(Math.random()*colors.length)]

let x=Math.random()*(window.innerWidth-size)
let y=Math.random()*(window.innerHeight-200)

let vx=(Math.random()-.5)*0.3
let vy=(Math.random()-.5)*0.3

el.style.left=x+"px"
el.style.top=y+"px"

game.appendChild(el)

let obj={el,x,y,vx,vy,size,num}

el.onclick=()=>{

if(num===target){

popSound.currentTime=0
popSound.play()

el.classList.add("pop")

setTimeout(()=>el.remove(),200)

stage++

if(stage>stageCount.length) stage=1

setTimeout(startStage,500)

}

}

balls.push(obj)

}

/* 움직임 */

function update(){

for(let b of balls){

b.x+=b.vx+tiltX
b.y+=b.vy+tiltY

if(b.x<0||b.x+b.size>window.innerWidth) b.vx*=-1
if(b.y<0||b.y+b.size>window.innerHeight) b.vy*=-1

}

/* 충돌 */

for(let i=0;i<balls.length;i++){

for(let j=i+1;j<balls.length;j++){

let a=balls[i]
let b=balls[j]

let dx=b.x-a.x
let dy=b.y-a.y

let dist=Math.sqrt(dx*dx+dy*dy)

let min=a.size

if(dist<min){

let angle=Math.atan2(dy,dx)

let overlap=min-dist

let pushX=Math.cos(angle)*(overlap/2)
let pushY=Math.sin(angle)*(overlap/2)

a.x-=pushX
a.y-=pushY

b.x+=pushX
b.y+=pushY

}

}

}

balls.forEach(b=>{

b.el.style.left=b.x+"px"
b.el.style.top=b.y+"px"

})

requestAnimationFrame(update)

}

update()

</script>

</body>
</html>
