<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>숫자 찾기 게임</title>

<style>

body{
margin:0;
background:#0b132b;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
color:white;
text-align:center;
overflow:hidden;
}

/* 홈버튼 */

.home{

position:absolute;
top:20px;
left:20px;

width:44px;
height:44px;

border-radius:50%;
background:rgba(255,255,255,.15);

display:flex;
align-items:center;
justify-content:center;

font-size:20px;
font-weight:bold;

cursor:pointer;

z-index:10;

}

/* 제목 */

.title{

margin-top:40px;
font-size:32px;
font-weight:800;

}

/* 미션 */

.mission{

margin-top:10px;
font-size:26px;
color:#ffd166;
font-weight:700;

}

/* 게임 영역 */

#game{

position:relative;
width:100vw;
height:85vh;

}

/* 숫자 원 */

.ball{

position:absolute;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-weight:800;
color:white;

cursor:pointer;

user-select:none;

box-shadow:
0 8px 20px rgba(0,0,0,.35),
inset 0 6px 8px rgba(255,255,255,.15);

transition:transform .15s;

}

.ball:active{

transform:scale(.9);

}

/* 터지는 애니메이션 */

.pop{

animation:pop .25s forwards;

}

@keyframes pop{

0%{transform:scale(1)}
40%{transform:scale(1.3)}
100%{transform:scale(0);opacity:0}

}

</style>

</head>

<body>

<div class="home" onclick="location.href='index.html'">
✕
</div>

<div class="title">
숫자 찾기 게임
</div>

<div class="mission" id="mission">
3을 빠르게 찾으세요
</div>

<div id="game"></div>

<script>

const game=document.getElementById("game")
const mission=document.getElementById("mission")

let balls=[]
let level=1
let target=0
let remaining=0

const colors=[
"#ff595e","#ff924c","#ffca3a",
"#8ac926","#52b788",
"#1982c4","#6a4c93"
]

const popSound=new Audio("https://assets.mixkit.co/sfx/preview/mixkit-balloon-pop-1980.mp3")

function speak(t){

if(!speechSynthesis)return

let s=new SpeechSynthesisUtterance(t)

s.lang="ko-KR"

speechSynthesis.cancel()
speechSynthesis.speak(s)

}

/* 라운드 시작 */

function startRound(){

game.innerHTML=""
balls=[]

let max=level<3?9:level<5?20:99

target=Math.floor(Math.random()*max)+1

mission.innerText=target+"를 빠르게 찾으세요"

speak(target)

let total=10+level*4

remaining=Math.floor(total/4)

let size=90-level*6
if(size<38)size=38

for(let i=0;i<total;i++){

let num=Math.floor(Math.random()*max)+1
if(i<remaining)num=target

spawn(num,size)

}

}

/* 원 생성 */

function spawn(num,size){

let el=document.createElement("div")

el.className="ball"

el.innerText=num

el.style.width=size+"px"
el.style.height=size+"px"

el.style.fontSize=size/3+"px"

el.style.background=colors[Math.floor(Math.random()*colors.length)]

let x=Math.random()*(window.innerWidth-size)
let y=Math.random()*(window.innerHeight-200)

let vx=(Math.random()-.5)*0.8
let vy=(Math.random()-.5)*0.8

el.style.left=x+"px"
el.style.top=y+"px"

game.appendChild(el)

let obj={el,x,y,vx,vy,size,num}

el.onclick=()=>{

if(num==target){

popSound.currentTime=0
popSound.play()

el.classList.add("pop")

speak(num)

remaining--

setTimeout(()=>el.remove(),200)

if(remaining==0){

level++
setTimeout(startRound,600)

}

}else{

speak("다시")

}

}

balls.push(obj)

}

/* 물리 */

function update(){

for(let b of balls){

b.x+=b.vx
b.y+=b.vy

if(b.x<0||b.x+b.size>window.innerWidth){

b.vx*=-1

}

if(b.y<0||b.y+b.size>window.innerHeight){

b.vy*=-1

}

}

/* 충돌 */

for(let i=0;i<balls.length;i++){

for(let j=i+1;j<balls.length;j++){

let a=balls[i]
let b=balls[j]

let dx=b.x-a.x
let dy=b.y-a.y

let dist=Math.sqrt(dx*dx+dy*dy)

let min=a.size

if(dist<min){

let angle=Math.atan2(dy,dx)

let overlap=min-dist

let pushX=Math.cos(angle)*(overlap/2)
let pushY=Math.sin(angle)*(overlap/2)

a.x-=pushX
a.y-=pushY

b.x+=pushX
b.y+=pushY

let temp=a.vx
a.vx=b.vx
b.vx=temp

temp=a.vy
a.vy=b.vy
b.vy=temp

}

}

}

/* 위치 업데이트 */

for(let b of balls){

b.el.style.left=b.x+"px"
b.el.style.top=b.y+"px"

}

requestAnimationFrame(update)

}

startRound()
update()

</script>

</body>
</html>
